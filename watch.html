<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch HTML - Universal Video Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff4757;
            font-size: 2rem;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2f3542;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border: 2px solid #ff4757;
        }

        button {
            padding: 12px 24px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #e84118;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .info-text {
            margin-top: 15px;
            font-size: 14px;
            color: #a4b0be;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Watch HTML</h1>
    
    <div class="input-area">
        <input type="text" id="videoUrl" placeholder="यहाँ वीडियो का URL या लिंक पेस्ट करें (MP4, WebM, M3U8...)" />
        <button onclick="playVideo()">प्ले करें</button>
    </div>

    <div class="video-wrapper">
        <video id="myVideo" controls autoplay>
            Your browser does not support the video tag.
        </video>
    </div>

    <p class="info-text">टिप: आप इसमें सीधे किसी भी ऑनलाइन वीडियो का डायरेक्ट लिंक डालकर प्ले कर सकते हैं।</p>
</div>

<script>
    function playVideo() {
        const url = document.getElementById('videoUrl').value.trim();
        const video = document.getElementById('myVideo');

        if (!url) {
            alert('कृपया पहले एक वैध वीडियो लिंक डालें!');
            return;
        }

        // अगर लिंक HLS (.m3u8) स्ट्रीमिंग फ़ाइल है
        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // सफारी ब्राउज़र के लिए नेटिव सपोर्ट
                video.src = url;
                video.play();
            } else {
                alert('आपका ब्राउज़र इस स्ट्रीमिंग फॉर्मेट को सपोर्ट नहीं करता।');
            }
        } else {
            // सामान्य वीडियो फॉर्मेट्स के लिए (MP4, WebM आदि)
            video.src = url;
            video.load();
            video.play().catch(error => {
                alert('वीडियो प्ले करने में समस्या आई। कृपया लिंक की जांच करें।');
            });
        }
    }
</script>

</body>
</html>
