<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Player & Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f1a;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* टॉप नेविगेशन बार */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            padding: 10px 0;
            border-bottom: 1px solid #2e2e4f;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .home-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: #cc0044;
        }

        h1 {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            font-size: 1.5rem;
        }

        /* लिंक इनपुट बॉक्स */
        .link-box {
            display: flex;
            align-items: center;
            width: 50%;
            max-width: 600px;
        }

        .link-box input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #2e2e4f;
            background: #1a1a2e;
            color: white;
            border-radius: 20px 0 0 20px;
            outline: none;
        }

        .link-box input:focus {
            border-color: #ff0055;
        }

        .link-box button {
            padding: 12px 25px;
            border: none;
            background: #ff0055;
            color: white;
            font-weight: bold;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .link-box button:hover {
            background: #cc0044;
        }

        .info-text {
            margin-bottom: 20px;
            color: #8a8ab3;
            font-size: 0.9rem;
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
        }

        /* वीडियो कंटेनर */
        #player-container {
            display: none;
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            margin-top: 10px;
        }

        .media-box {
            width: 100%;
            height: 450px;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* डाउनलोड बटन का स्टाइल */
        .download-action-box {
            display: none;
            text-align: center;
            padding: 15px;
            background: #1a1a2e;
            border-top: 1px solid #2e2e4f;
        }

        .download-btn {
            display: inline-block;
            background: #00ffcc;
            color: #0f0f1a;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #00ccaa;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-section">
            <button class="home-btn" onclick="goHome()">Home</button>
            <h1>Race Player & Downloader</h1>
        </div>
        
        <div class="link-box">
            <input type="text" id="videoLinkInput" placeholder="यहाँ वीडियो का लिंक पेस्ट करें...">
            <button onclick="loadUniversalVideo()">Play</button>
        </div>
    </div>

    <p class="info-text">
        💡 <b>नोट:</b> केवल डायरेक्ट वीडियो लिंक्स (जैसे जिसके अंत में <code>.mp4</code> हो) को ही इस डाउनलोड बटन से सीधे डाउनलोड किया जा सकता है। YouTube सुरक्षा कारणों से डायरेक्ट डाउनलोड की अनुमति नहीं देता।
    </p>

    <div id="player-container">
        <div class="media-box">
            <iframe id="iframe-player" src="" allowfullscreen></iframe>
            
            <video id="html5-player" controls autoplay controlsList="download"></video>
        </div>

        <div class="download-action-box" id="downloadBox">
            <a href="" id="downloadLink" class="download-btn" download="race-video.mp4">📥 Download Video File</a>
        </div>
    </div>

    <script>
        function loadUniversalVideo() {
            const inputLink = document.getElementById('videoLinkInput').value.trim();
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('iframe-player');
            const videoTag = document.getElementById('html5-player');
            const downloadBox = document.getElementById('downloadBox');
            const downloadLink = document.getElementById('downloadLink');

            if (inputLink === "") {
                alert("कृपया पहले एक वीडियो लिंक पेस्ट करें!");
                return;
            }

            // रीसेट करें
            iframe.style.display = "none";
            iframe.src = "";
            videoTag.style.display = "none";
            videoTag.src = "";
            videoTag.pause();
            downloadBox.style.display = "none";
            downloadLink.href = "";

            // जांचें कि क्या यह डायरेक्ट वीडियो (.mp4, आदि) है
            const isDirectVideo = inputLink.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i);

            if (isDirectVideo) {
                // इन-बिल्ट प्लेयर में चलाएं
                videoTag.src = inputLink;
                videoTag.style.display = "block";
                
                // डाउनलोड बटन को लिंक दें और दिखाएं
                downloadLink.href = inputLink;
                downloadBox.style.display = "block";
            } else {
                // YouTube या अन्य साइट्स के लिए iframe
                let finalLink = inputLink;
                
                if (inputLink.includes("youtube.com/watch?v=")) {
                    let videoId = inputLink.split("v=")[1].split("&")[0];
                    finalLink = "https://www.youtube.com/embed/" + videoId;
                } else if (inputLink.includes("youtu.be/")) {
                    let videoId = inputLink.split("youtu.be/")[1].split("?")[0];
                    finalLink = "https://www.youtube.com/embed/" + videoId;
                }

                iframe.src = finalLink;
                iframe.style.display = "block";
                
                // ध्यान दें: YouTube लिंक्स के लिए यह डाउनलोड बटन काम नहीं करेगा क्योंकि वे डायरेक्ट फाइल पाथ नहीं देते।
            }

            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function goHome() {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('iframe-player');
            const videoTag = document.getElementById('html5-player');
            const inputField = document.getElementById('videoLinkInput');
            const downloadBox = document.getElementById('downloadBox');
            
            iframe.src = "";
            videoTag.src = "";
            videoTag.pause();
            
            container.style.display = 'none';
            iframe.style.display = "none";
            videoTag.style.display = "none";
            downloadBox.style.display = "none";
            inputField.value = "";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
