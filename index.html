<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SATELLITE TRAIN TRACKER</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b111e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsive Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
        }

        /* Desktop View: Auto Split into Two Columns */
        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 320px 1fr;
            }
        }

        /* LEFT COLUMN: AI Processing System Panel */
        .processing-panel {
            background: #0d1624;
            border: 1px solid #1e2d4a;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }
        .panel-title {
            color: #00ffcc;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        .log-box {
            background: #050a12;
            border: 1px solid #152033;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #8fa0dd;
            min-height: 180px;
            max-height: 250px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px dashed #152033;
            padding-bottom: 4px;
        }
        .log-success { color: #00ffcc; }
        .log-warn { color: #ffcc00; }

        /* RIGHT COLUMN: Main Train Tracker Card Box */
        .tracker-card {
            background: #151f32;
            border: 1px solid #233554;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .title {
            color: #ff3333;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #8fa0dd;
            font-size: 11px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Live Clock Badge */
        .time-badge {
            background: #0d1624;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 15px;
            color: #ffcc00;
            margin-bottom: 20px;
            border: 1px solid #1e2d4a;
            font-weight: bold;
        }

        /* Input Layout */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: #0d1624;
            border: 1px solid #233554;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            outline: none;
        }
        input:focus { border-color: #ff3333; }
        button {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #cc0000; }

        /* Status Output Map Elements */
        .status-container { margin-top: 15px; min-height: 60px; }
        .route-box {
            background: #0d1624;
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            border: 1px solid #1e2d4a;
        }
        .train-header {
            background: #117a45;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .station-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .station-dot {
            width: 10px;
            height: 10px;
            background: #233554;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            margin-top: 4px;
        }
        .station-info { color: #cccccc; }
        .station-info strong { color: #ffffff; }
        .status-badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 5px;
            font-weight: bold;
        }
        .status-passed { background: rgba(0, 255, 204, 0.1); color: #00ffcc; }
        .status-current { background: rgba(255, 51, 51, 0.1); color: #ff3333; }
        .status-upcoming { background: rgba(255, 255, 255, 0.1); color: #aaa; }

        .official-btn {
            display: inline-block;
            margin-top: 10px;
            background: #0284c7;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 204, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        
        <div class="processing-panel">
            <div class="panel-title">
                <div class="pulse-dot"></div>
                AI Diagnostics Terminal
            </div>
            <div class="log-box" id="terminalLogs">
                <div class="log-entry log-success">[CORE] Processing Engine Initialized.</div>
                <div class="log-entry">[SYSTEM] Awaiting Train Code Input...</div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="title">TRAIN TRACKER</div>
            <div class="subtitle">National Satellite Telemetry Feed</div>
            
            <div class="time-badge">
                <span>SYSTEM TIME: <span id="clockDisplay">--:--:-- AM</span></span>
            </div>

            <div class="search-box">
                <input type="number" id="trainInput" placeholder="Enter Train Number (e.g. 13022)" onkeypress="handleKeyPress(event)">
                <button onclick="trackLiveTrain()">TRACK</button>
            </div>

            <div class="status-container" id="statusOutput">
                <p style="color: #64748b; font-size: 13px;">Enter a train number to compute global schedules.</p>
                <p style="color: #475569; font-size: 11px; margin-top: 6px;">Try database keys: 13022, 12391, 12561, 12301</p>
            </div>
        </div>

    </div>

    <script>
        const trainDatabase = {
            "13022": {
                name: "Mithila Express",
                route: [
                    { station: "Raxaul Junction (RXL)", time: "Departed • 10:00 AM", status: "passed" },
                    { station: "Sugauli Junction (SGL)", time: "Passed • 10:35 AM", status: "passed" },
                    { station: "Bapudham Motihari (BMKI)", time: "Passed • 11:02 AM", status: "passed" },
                    { station: "Muzaffarpur Jn (MFP)", time: "Arrived • Pf 3 • 01:45 PM", status: "current" },
                    { station: "Samastipur Junction (SPJ)", time: "Scheduled • 02:55 PM", status: "upcoming" }
                ]
            },
            "12391": {
                name: "Shramjeevi Superfast Express",
                route: [
                    { station: "Rajgir (RGD)", time: "Departed • 08:05 AM", status: "passed" },
                    { station: "Patna Junction (PNBE)", time: "Passed • 10:20 AM", status: "passed" },
                    { station: "Dildarnagar Jn (DLN)", time: "Arrived • 01:10 PM", status: "current" },
                    { station: "New Delhi (NDLS)", time: "Scheduled • 04:45 AM", status: "upcoming" }
                ]
            }
        };

        function addLog(text, type = '') {
            const box = document.getElementById('terminalLogs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight; 
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours(), minutes = now.getMinutes(), seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clockDisplay').innerText = `${hours < 10 ? '0'+hours : hours}:${minutes < 10 ? '0'+minutes : minutes}:${seconds < 10 ? '0'+seconds : seconds} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        window.onload = updateClock;

        function handleKeyPress(event) {
            if (event.key === "Enter") trackLiveTrain();
        }

        function trackLiveTrain() {
            const num = document.getElementById('trainInput').value.trim();
            const output = document.getElementById('statusOutput');

            if (!num) {
                addLog("Execution failed: Missing input parameter.", "log-warn");
                output.innerHTML = `<p style="color: #ff3333; font-size: 13px;">⚠️ Train number darj kaerin.</p>`;
                return;
            }

            addLog(`Ping requested for Query Node: #${num}`);
            addLog("Connecting satellite telemetry alignment...", "log-warn");

            output.innerHTML = `
                <div style="color: #ffcc00; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span style="display:inline-block; width:14px; height:14px; border:2px solid #ffcc00; border-top:2px solid transparent; border-radius:50%; animation:spin 0.8s linear infinite;"></span>
                    Computing AI Matrix Link...
                </div>
            `;

            setTimeout(() => {
                if (trainDatabase[num]) {
                    const train = trainDatabase[num];
                    addLog(`Success! Link established with ${train.name}`, "log-success");
                    
                    let htmlData = `<div class="route-box"><div class="train-header">🛰️ INTERCEPT: ${train.name} (${num})</div>`;
                    train.route.forEach(st => {
                        let badgeClass = st.status === 'passed' ? 'status-passed' : (st.status === 'current' ? 'status-current' : 'status-upcoming');
                        htmlData += `
                            <div class="station-item">
                                <div class="station-dot" style="border-color: ${st.status === 'current' ? '#ff3333' : '#00ffcc'}"></div>
                                <div class="station-info">
                                    <strong>${st.station}</strong> <span class="status-badge ${badgeClass}">${st.status.toUpperCase()}</span>
                                    <p style="font-size: 11px; color: #8fa0dd; margin-top:1px;">${st.time}</p>
                                </div>
                            </div>
                        `;
                    });
                    output.innerHTML = htmlData + `</div>`;
                } else {
                    addLog(`Alert: Object #${num} outside local dataset index limit.`, "log-warn");
                    output.innerHTML = `
                        <div style="background: rgba(255,255,255,0.05); border: 1px solid #233554; padding: 12px; border-radius: 8px; color: #cccccc; font-size: 13px; text-align: left;">
                            📡 <strong>Unknown Target Code</strong><br>
                            Is object code ko trace karne ke liye secondary external core use karein:<br>
                            <a href="https://enquiry.indianrail.gov.in/mntes/" target="_blank" class="official-btn" style="text-decoration:none;font-weight:bold;">🔍 NTES Live Interface</a>
                        </div>
                    `;
                }
            }, 1000);
        }
    </script>
</body>
</html>
