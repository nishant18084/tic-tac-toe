<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Tic Tac Toe Arcade</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0e29; color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; width: 100vw; overflow: hidden;
        }
        .arcade-container {
            width: 90vw; max-width: 380px; height: 85vh;
            background: #12183a; border: 3px solid #00ffcc; border-radius: 20px;
            padding: 15px; display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,255,204,0.3);
        }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .active-screen { display: flex !important; }
        
        h1 { font-size: 2rem; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); text-align: center; margin-bottom: 20px; }
        
        /* Start Button */
        .start-btn {
            background: #ff0077; color: white; border: none; padding: 15px 40px;
            font-size: 1.4rem; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,0,119,0.4);
        }
        
        /* Grid Layout */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .game-card { background: #1a224d; border: 1px solid #00aaff; border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .play-btn { background: #00ffcc; color: #0a0e29; border: none; padding: 8px 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        /* Game Screen */
        canvas { background: #050714; border: 2px solid #ff0077; border-radius: 12px; max-width: 100%; aspect-ratio: 1/1; }
        .back-btn { background: none; border: 1px solid #ff0077; color: #ff0077; padding: 6px 12px; border-radius: 8px; margin-bottom: 10px; align-self: flex-start; cursor: pointer; }
    </style>
</head>
<body>

    <div class="arcade-container">
        <div class="screen active-screen" id="startView">
            <h1>MEGA ARCADE</h1>
            <button class="start-btn" onclick="goScreen('menuView')">START</button>
        </div>

        <div class="screen" id="menuView">
            <h1>SELECT GAME</h1>
            <div class="menu-grid">
                <div class="game-card">
                    <div>
                        <p style="font-weight:bold;">Tic Tac Toe</p>
                        <p style="font-size:0.8rem; color:#8196e6;">Retro X vs O</p>
                    </div>
                    <button class="play-btn" onclick="startGame()">PLAY</button>
                </div>
            </div>
        </div>

        <div class="screen" id="gameView">
            <button class="back-btn" onclick="goScreen('menuView')">⬅ Menu</button>
            <canvas id="gameCanvas" width="300" height="300"></canvas>
            <p style="margin-top:15px; color:#ffff00; font-weight:bold;">Score: <span id="scoreText">0</span></p>
        </div>
    </div>

    <script>
        let grid = ["","","","","","","","",""];
        let gameOver = false;
        let score = 0;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function goScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function startGame() {
            goScreen('gameView');
            grid = ["","","","","","","","",""];
            gameOver = false;
            drawBoard();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, 300, 300);
            ctx.strokeStyle = '#334477'; ctx.lineWidth = 4;
            // Lines
            ctx.beginPath();
            ctx.moveTo(100, 10); ctx.lineTo(100, 290);
            ctx.moveTo(200, 10); ctx.lineTo(200, 290);
            ctx.moveTo(10, 100); ctx.lineTo(290, 100);
            ctx.moveTo(10, 200); ctx.lineTo(290, 200);
            ctx.stroke();

            // Draw X and O
            grid.forEach((val, i) => {
                let row = Math.floor(i / 3);
                let col = i % 3;
                let x = col * 100 + 50;
                let y = row * 100 + 50;
                if(val === "X") {
                    ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(x-20, y-20); ctx.lineTo(x+20, y+20); ctx.moveTo(x+20, y-20); ctx.lineTo(x-20, y+20); ctx.stroke();
                } else if(val === "O") {
                    ctx.strokeStyle = '#ff0077'; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.stroke();
                }
            });
        }

        canvas.addEventListener('click', function(e) {
            if(gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            let col = Math.floor(x / (rect.width / 3));
            let row = Math.floor(y / (rect.height / 3));
            let index = row * 3 + col;

            if(grid[index] === "") {
                grid[index] = "X";
                drawBoard();
                checkGame();
                if(!gameOver) {
                    setTimeout(botMove, 300);
                }
            }
        });

        function botMove() {
            let empties = grid.map((v,i) => v===""?i:null).filter(v => v!==null);
            if(empties.length > 0) {
                let move = empties[Math.floor(Math.random() * empties.length)];
                grid[move] = "O";
                drawBoard();
                checkGame();
            }
        }

        function checkGame() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let combo of wins) {
                if(grid[combo[0]] && grid[combo[0]]===grid[combo[1]] && grid[combo[0]]===grid[combo[2]]) {
                    gameOver = true;
                    if(grid[combo[0]] === "X") {
                        score += 10; document.getElementById('scoreText').innerText = score;
                        alert("🎉 Aap Jeet Gaye!");
                    } else {
                        alert("🤖 AI Jeet Gaya!");
                    }
                    return;
                }
            }
            if(!grid.includes("")) { gameOver = true; alert("🤝 Match Draw!"); }
        }
    </script>
</body>
</html>
