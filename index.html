<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Arcade Pro - Ultimate 10/10 Gold</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #020510; color: white; padding: 10px;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
        }
        
        .arcade-wrapper {
            width: 100%; max-width: 400px; background: linear-gradient(180deg, #090f26 0%, #050917 100%);
            border: 3px solid #1c2e6e; border-radius: 32px; padding: 20px 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; gap: 12px; margin-top: 5px;
        }

        .menu-screen, .game-screen { display: flex; flex-direction: column; width: 100%; }
        .game-screen { display: none; }

        .main-title {
            font-size: 2.1rem; font-weight: 900; text-align: center; margin: 5px 0;
            background: linear-gradient(90deg, #00ffcc, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0,255,204,0.4); letter-spacing: 1px;
        }
        .alltime-badge {
            align-self: center; background: rgba(255, 0, 128, 0.2); border: 1px solid #ff0077;
            padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 800;
            color: #ff3399; margin-bottom: 15px;
        }

        .game-card {
            background: linear-gradient(135deg, #121b44 0%, #080d24 100%);
            border: 2px solid #20337a; border-radius: 20px; padding: 14px 18px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4); margin-bottom: 10px;
        }
        .card-info { display: flex; flex-direction: column; gap: 2px; }
        .card-title { font-size: 1.2rem; font-weight: 800; color: #ffffff; }
        .card-subtitle { font-size: 0.75rem; color: #8196e6; }
        
        .play-btn {
            background: linear-gradient(90deg, #ff0055, #ff00aa); color: white;
            padding: 10px 22px; font-size: 0.95rem; font-weight: 900; border: none;
            border-radius: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,0,85,0.3);
        }

        .hud-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; width: 100%; }
        .back-btn { padding: 6px 14px; font-size: 0.9rem; font-weight: 800; border-radius: 10px; border: 1px solid #ff0055; background: rgba(255,0,85,0.15); color: #ff4588; }
        .game-tag-title { font-size: 1.15rem; font-weight: 800; color: #00ffcc; }
        .live-score { font-size: 1.05rem; font-weight: bold; color: #ffff00; }

        canvas#arcadeCanvas {
            background: #01030a; border: 3px solid #00ffcc; border-radius: 20px;
            width: 100%; height: auto; aspect-ratio: 1/1; display: block;
        }

        /* Highly Optimized Mobile Controls Grid Layout */
        .console-controls { display: none; flex-direction: column; align-items: center; gap: 5px; margin-top: 15px; width: 100%; }
        .dpad-row { display: flex; gap: 45px; align-items: center; }
        .ctrl-btn {
            width: 64px; height: 64px; background: linear-gradient(135deg, #162452 0%, #0d1633 100%); 
            color: #00ffcc; border: 2px solid #253b80; font-size: 1.6rem; font-weight: bold; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { background: #00ffcc; color: #01030a; border-color: #00ffcc; }
        
        .shoot-action-btn {
            width: 100%; max-width: 200px; height: 48px; background: linear-gradient(90deg, #ff2a00, #ff0066);
            color: white; border: none; font-weight: 900; border-radius: 24px; font-size: 1.15rem;
            margin-top: 8px; box-shadow: 0 5px 15px rgba(255,42,0,0.4);
        }
    </style>
</head>
<body>

    <div class="arcade-wrapper">
        <div class="menu-screen" id="menuView">
            <div class="main-title">MEGA ARCADE PRO</div>
            <div class="alltime-badge" id="bestAllTime">🔥 ALL-TIME HIGH: 0</div>
            
            <div class="game-card"><div class="card-info"><span class="card-title">Neon Snake 3D</span><span class="card-subtitle">Retro Nibble Mode</span></div><button class="play-btn" onclick="launchGame(1)">PLAY</button></div>
            <div class="game-card"><div class="card-info"><span class="card-title">Asphalt Nitro Pro</span><span class="card-subtitle">2D Cyber Racer</span></div><button class="play-btn" onclick="launchGame(2)">PLAY</button></div>
            <div class="game-card"><div class="card-info"><span class="card-title">Diamond Block Blast</span><span class="card-subtitle">Classic Grid Puzzle</span></div><button class="play-btn" onclick="launchGame(3)">PLAY</button></div>
            <div class="game-card"><div class="card-info"><span class="card-title">Squad Survival 2D</span><span class="card-subtitle">Laser Bullet Shooter</span></div><button class="play-btn" onclick="launchGame(4)">PLAY</button></div>
            <div class="game-card"><div class="card-info"><span class="card-title">Moto Hill Overdrive</span><span class="card-subtitle">Physics Hill Climber</span></div><button class="play-btn" onclick="launchGame(5)">PLAY</button></div>
        </div>

        <div class="game-screen" id="gameView">
            <div class="hud-bar">
                <button class="back-btn" onclick="closeGame()">⬅ Exit</button>
                <span class="game-tag-title" id="hudTitle">Game</span>
                <div class="live-score">Score: <span id="hudScore" style="color:#fff;">0</span></div>
            </div>
            <canvas id="arcadeCanvas" width="400" height="400"></canvas>
            
            <div class="console-controls" id="padConsole">
                <button class="ctrl-btn" ontouchstart="startMove('UP')" ontouchend="stopMove()">▲</button>
                <div class="dpad-row">
                    <button class="ctrl-btn" ontouchstart="startMove('LEFT')" ontouchend="stopMove()">◀</button>
                    <button class="ctrl-btn" ontouchstart="startMove('RIGHT')" ontouchend="stopMove()">▶</button>
                </div>
                <button class="ctrl-btn" ontouchstart="startMove('DOWN')" ontouchend="stopMove()">▼</button>
                <button class="shoot-action-btn" id="consoleActionBtn" style="display:none;" ontouchstart="handleAction()">💥 SHOOT</button>
            </div>
        </div>
    </div>

    <script>
        let currentGame = null, loopRef = null;
        let pX, pY, score, objects, bullets, particles;
        let snake, food, sDx, sDy, snakeTimer;
        let hillBikeY, hillBikeVy;
        let activeDir = null, moveInterval = null;

        const canvas = document.getElementById('arcadeCanvas');
        const ctx = canvas.getContext('2d');

        function refreshGlobalBest() {
            let maxScore = 0;
            for(let i=1; i<=5; i++) {
                let val = localStorage.getItem('arcade_v5_best_' + i) || 0;
                if(parseInt(val) > maxScore) maxScore = val;
            }
            document.getElementById('bestAllTime').innerText = `🔥 ALL-TIME HIGH: ${maxScore}`;
        }

        function syncScore() {
            document.getElementById('hudScore').innerText = score;
            let currentBest = localStorage.getItem('arcade_v5_best_' + currentGame) || 0;
            if (score > parseInt(currentBest)) {
                localStorage.setItem('arcade_v5_best_' + currentGame, score);
            }
        }

        function launchGame(id) {
            document.getElementById('menuView').style.display = 'none';
            document.getElementById('gameView').style.display = 'flex';
            document.getElementById('padConsole').style.display = 'flex';
            document.getElementById('consoleActionBtn').style.display = (id === 4) ? 'block' : 'none';
            
            currentGame = id; score = 0; objects = []; bullets = []; particles = [];
            syncScore();

            if(id === 1) {
                document.getElementById('hudTitle').innerText = "Neon Snake";
                snake = [{x:200, y:200}, {x:180, y:200}, {x:160, y:200}]; food = {x:100, y:100}; sDx = 20; sDy = 0;
            } else if(id === 2) {
                document.getElementById('hudTitle').innerText = "Asphalt Nitro";
                pX = 200; pY = 340;
            } else if(id === 3) {
                document.getElementById('hudTitle').innerText = "Block Blast";
                pX = 200; pY = 360;
            } else if(id === 4) {
                document.getElementById('hudTitle').innerText = "Squad Survival";
                pX = 200; pY = 320;
            } else if(id === 5) {
                document.getElementById('hudTitle').innerText = "Hill Overdrive";
                pX = 80; hillBikeY = 280; hillBikeVy = 0;
            }

            snakeTimer = performance.now();
            if(loopRef) cancelAnimationFrame(loopRef);
            loopRef = requestAnimationFrame(engineLoop);
        }

        function closeGame() {
            stopMove();
            if(loopRef) cancelAnimationFrame(loopRef);
            currentGame = null; refreshGlobalBest();
            document.getElementById('gameView').style.display = 'none';
            document.getElementById('menuView').style.display = 'flex';
        }

        // Direct Multi-Touch Tracking Engine
        function startMove(dir) {
            activeDir = dir;
            if(moveInterval) clearInterval(moveInterval);
            executeMove();
            moveInterval = setInterval(executeMove, 50);
        }

        function stopMove() {
            activeDir = null;
            if(moveInterval) clearInterval(moveInterval);
        }

        function executeMove() {
            if(!currentGame || !activeDir) return;
            if(currentGame === 1) {
                if(activeDir==='LEFT' && sDx===0) { sDx = -20; sDy = 0; }
                if(activeDir==='RIGHT' && sDx===0) { sDx = 20; sDy = 0; }
                if(activeDir==='UP' && sDy===0) { sDx = 0; sDy = -20; }
                if(activeDir==='DOWN' && sDy===0) { sDx = 0; sDy = 20; }
                activeDir = null; // Turn commands execute once per touch
            } else if(currentGame === 5) {
                if((activeDir==='UP' || activeDir==='RIGHT') && hillBikeY === 280) { hillBikeVy = -12; }
                activeDir = null;
            } else {
                if(activeDir==='LEFT') pX = Math.max(30, pX - 12);
                if(activeDir==='RIGHT') pX = Math.min(370, pX + 12);
                if(activeDir==='UP' && currentGame === 4) pY = Math.max(160, pY - 12);
                if(activeDir==='DOWN' && currentGame === 4) pY = Math.min(360, pY + 12);
            }
        }

        function handleAction() {
            if(currentGame === 4) { bullets.push({x: pX, y: pY - 20}); }
        }

        function triggerBlast(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({x:x, y:y, dx:(Math.random()-0.5)*5, dy:(Math.random()-0.5)*5, r:Math.random()*2+1, a:1, c:color});
            }
        }

        function triggerGameOver() {
            alert(`🎮 Match Concluded!\nScore: ${score}`);
            closeGame();
        }

        function engineLoop(timestamp) {
            if(!currentGame) return;
            ctx.fillStyle = '#030612'; ctx.fillRect(0,0,400,400);

            // Matrix Layout Grid Line
            ctx.strokeStyle = 'rgba(0,255,204,0.03)'; ctx.lineWidth = 1;
            for(let i=0; i<=400; i+=20) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke();
            }

            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.a -= 0.05;
                ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
                if(p.a <= 0) particles.splice(i, 1);
            });

            if(currentGame === 1) {
                if(timestamp - snakeTimer > 130) {
                    let h = {x: snake[0].x + sDx, y: snake[0].y + sDy};
                    if(h.x < 10 || h.x >= 390 || h.y < 10 || h.y >= 390 || snake.some(s=>s.x===h.x && s.y===h.y)) { triggerGameOver(); return; }
                    snake.unshift(h);
                    if(Math.abs(h.x - food.x) < 15 && Math.abs(h.y - food.y) < 15) {
                        score += 10; syncScore(); triggerBlast(food.x, food.y, '#ff00aa');
                        food = {x: Math.floor(Math.random()*18)*20+20, y: Math.floor(Math.random()*18)*20+20};
                    } else { snake.pop(); }
                    snakeTimer = timestamp;
                }
                ctx.fillStyle = '#ff0077'; ctx.beginPath(); ctx.arc(food.x, food.y, 7, 0, Math.PI*2); ctx.fill();
                snake.forEach((s, idx) => { ctx.fillStyle = idx===0?'#00ffcc':'#00aa99'; ctx.fillRect(s.x-8, s.y-8, 16, 16); });
            }
            
            else if(currentGame === 2) {
                if(Math.random() < 0.03) objects.push({x:Math.random()*200+100, y:-40, spd:4.5});
                ctx.fillStyle = '#0b1026'; ctx.fillRect(80, 0, 240, 400);
                ctx.fillStyle = '#ff00aa'; ctx.fillRect(pX-12, pY-20, 24, 40);
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(pX-10, pY-12, 20, 8); 

                objects.forEach((o, i) => {
                    o.y += o.spd; ctx.fillStyle = '#3366ff'; ctx.fillRect(o.x-12, o.y-20, 24, 40);
                    if(o.y > 440) { objects.splice(i,1); score += 10; syncScore(); }
                    if(Math.abs(pX - o.x) < 22 && Math.abs(pY - o.y) < 35) { triggerBlast(o.x, o.y, '#ff0055'); triggerGameOver(); }
                });
            }

            else if(currentGame === 3) {
                if(Math.random() < 0.04) objects.push({x:Math.random()*340+30, y:-20, spd:3.5});
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(pX-30, pY-8, 60, 16);

                objects.forEach((o, i) => {
                    o.y += o.spd; ctx.fillStyle = '#ffaa00'; ctx.fillRect(o.x-10, o.y-10, 20, 20);
                    if(o.y > 420) { triggerBlast(o.x, 390, '#ff3300'); triggerGameOver(); }
                    if(Math.abs(pX - o.x) < 40 && Math.abs(pY - o.y) < 16) {
                        triggerBlast(o.x, o.y, '#00ffff'); objects.splice(i,1); score += 10; syncScore();
                    }
                });
            }

            else if(currentGame === 4) {
                if(Math.random() < 0.04) objects.push({x:Math.random()*340+30, y:-20, spd:2.2});
                ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.moveTo(pX, pY-18); ctx.lineTo(pX-14, pY+12); ctx.lineTo(pX+14, pY+12); ctx.closePath(); ctx.fill();

                bullets.forEach((b, bi) => {
                    b.y -= 9; ctx.fillStyle = '#ff0055'; ctx.fillRect(b.x-2, b.y-6, 4, 12);
                    if(b.y < 0) bullets.splice(bi, 1);
                });

                objects.forEach((o, oi) => {
                    o.y += o.spd; ctx.fillStyle = '#9933ff'; ctx.beginPath(); ctx.arc(o.x, o.y, 11, 0, Math.PI*2); ctx.fill();
                    if(o.y > 410 || (Math.abs(pX - o.x) < 24 && Math.abs(pY - o.y) < 24)) { triggerBlast(o.x, o.y, '#ff3300'); triggerGameOver(); }
                    bullets.forEach((b, bi) => {
                        if(Math.abs(b.x - o.x) < 18 && Math.abs(b.y - o.y) < 18) {
                            triggerBlast(o.x, o.y, '#ffaa00'); objects.splice(oi,1); bullets.splice(bi,1); score += 20; syncScore();
                        }
                    });
                });
            }

            else if(currentGame === 5) {
                hillBikeVy += 0.5; hillBikeY += hillBikeVy;
                if(hillBikeY > 280) { hillBikeY = 280; hillBikeVy = 0; }
                if(Math.random() < 0.025) objects.push({x:430, y:285});

                ctx.fillStyle = '#0e132c'; ctx.fillRect(0, 300, 400, 100);
                ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0,300); ctx.lineTo(400,300); ctx.stroke();

                ctx.fillStyle = '#ff00aa'; ctx.beginPath(); ctx.arc(pX-12, hillBikeY+10, 8, 0, Math.PI*2); ctx.arc(pX+12, hillBikeY+10, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillRect(pX-10, hillBikeY-5, 20, 10);

                objects.forEach((o, i) => {
                    o.x -= 5.5; ctx.fillStyle = '#ff3300';
                    ctx.beginPath(); ctx.moveTo(o.x, o.y+15); ctx.lineTo(o.x-10, o.y-8); ctx.lineTo(o.x+10, o.y-8); ctx.closePath(); ctx.fill();
                    if(o.x < -30) { objects.splice(i,1); score += 15; syncScore(); }
                    if(Math.abs(pX - o.x) < 24 && Math.abs(hillBikeY - o.y) < 20) { triggerBlast(pX, hillBikeY, '#ff0000'); triggerGameOver(); }
                });
            }

            loopRef = requestAnimationFrame(engineLoop);
        }

        window.onload = refreshGlobalBest;
    </script>
</body>
</html>
