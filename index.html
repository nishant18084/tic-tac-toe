<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Neon Arcade Hub ⚡</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            padding: 20px 0;
            text-align: center;
            border-bottom: 3px solid #66fcf1;
            box-shadow: 0px 4px 20px rgba(102, 252, 241, 0.3);
        }
        h1 {
            color: #66fcf1;
            margin: 0 0 15px 0;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #66fcf1;
        }
        #searchBar {
            padding: 12px 20px;
            width: 80%;
            max-width: 500px;
            border-radius: 25px;
            border: 2px solid #45f3ff;
            background-color: #1f2833;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #searchBar:focus {
            box-shadow: 0 0 15px #45f3ff;
        }
        #arenaContainer {
            display: none;
            width: 90%;
            max-width: 960px;
            margin: 20px 0;
            background: #1f2833;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #66fcf1;
        }
        #gameScreen {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 8px;
        }
        .close-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            float: right;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding: 30px 0;
        }
        .game-card {
            background-color: #1f2833;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #45f3ff;
            text-align: center;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(69, 243, 255, 0.5);
        }
        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .game-title {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 NEON ARCADE HUB 🎮</h1>
        <input type="text" id="searchBar" placeholder="🔍 Games search karein..." oninput="filterGames()">
    </header>

    <div id="arenaContainer">
        <button class="close-btn" onclick="closeGame()">❌ Close Game</button>
        <iframe id="gameScreen" src="" allowfullscreen></iframe>
    </div>

    <div class="game-grid" id="gameGrid">
        <div style="color: #66fcf1; grid-column: 1/-1; text-align: center;">Games load ho rahe hain...</div>
    </div>

    <script>
        // BACKUP GAMES LIST: Agar API block ho jaye, toh yeh games hamesha chalenge!
        // Aap yahan jitne chahein utne HTML5 games ke links add kar sakte hain.
        const backupGames = [
            { title: "Pac-Man", url: "https://play.pacman.com/", thumbnailUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTo_5f0XpLofK_NAs6M8uH74LgC0W0tqg64aA&s" },
            { title: "Minecraft Classic", url: "https://classic.minecraft.net/", thumbnailUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRqZqCgby94nZ5R6K5fQ2v-TeeG6C-f6vXitg&s" },
            { title: "Tetris", url: "https://tetris.com/play-tetris", thumbnailUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTf_z68PqjRREq02Z16-I9Xw0WpizgU5C4Z-g&s" },
            { title: "2048", url: "https://2048game.com/", thumbnailUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR06qD8n9EwzYf_6Zc9L0g2Bypv5F2C8r-xDA&s" },
            { title: "Flappy Bird", url: "https://flappybird.io/", thumbnailUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT37E9V6wZ5q-Vq5N9vG2r8X8K7rR7p1V9zYQ&s" },
            { title: "Snake Game", url: "https://www.google.com/fbx?fbx=snake_arcade", thumbnailUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3y3Z9lG8XvB6n-T1O_pXgL6mP9Q8-7_Xk8g&s" }
        ];

        let allGames = [];

        async function fetchGames() {
            try {
                // Ek open source public high-speed API try kar rahe hain
                const response = await fetch("https://cors-anywhere.herokuapp.com/https://api.gamepix.com/v3/games?collection=featured", {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                
                if (!response.ok) throw new Error("API network issue");
                const data = await response.json();
                allGames = data.data || data;
                
                // Agar API se kam games mile toh backup wale bhi jod do
                allGames = [...allGames, ...backupGames];
                displayGames(allGames);
            } catch (error) {
                console.log("API block hui, local backup games load kar rahe hain...");
                // Agar koi bhi API crash ho jaye, toh humare backup games chal jayenge
                allGames = backupGames;
                displayGames(allGames);
            }
        }

        function displayGames(gamesList) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = ""; 

            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => playGame(game.url);

                card.innerHTML = `
                    <img src="${game.thumbnailUrl || 'https://via.placeholder.com/150'}" alt="${game.title}">
                    <div class="game-title">${game.title}</div>
                `;
                grid.appendChild(card);
            });
        }

        function playGame(url) {
            const container = document.getElementById('arenaContainer');
            const iframe = document.getElementById('gameScreen');
            iframe.src = url;
            container.style.display = 'block';
            window.scrollTo({ top: container.offsetTop - 20, behavior: 'smooth' });
        }

        function closeGame() {
            const container = document.getElementById('arenaContainer');
            const iframe = document.getElementById('gameScreen');
            iframe.src = "";
            container.style.display = 'none';
        }

        function filterGames() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allGames.filter(game => game.title.toLowerCase().includes(query));
            displayGames(filtered);
        }

        window.onload = fetchGames;
    </script>
</body>
</html>
