<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Train Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>TRAIN TRACKER</h2>
        
        <div class="live-clock-card">
            <span class="clock-label">🔴 SYSTEM TIME:</span>
            <span id="liveClock">00:00:00 AM</span>
        </div>

        <div class="search-box">
            <input type="number" id="trainNum" placeholder="Enter Train Number (e.g. 13022)">
            <button onclick="getTrainStatus()">SEARCH</button>
        </div>
        
        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TRAIN TRACKER - SATELLITE FEED</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b111e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Tracker Card Box */
        .tracker-card {
            background: #151f32;
            border: 1px solid #233554;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .title {
            color: #ff3333;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
        }

        /* Live Clock Badge */
        .time-badge {
            background: #0d1624;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            color: #8fa0dd;
            margin-bottom: 20px;
            border: 1px solid #1e2d4a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        /* Search Input Box Layout */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: #0d1624;
            border: 1px solid #233554;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            outline: none;
        }
        input:focus {
            border-color: #ff3333;
        }
        button {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #cc0000;
        }

        /* Status Output Screens */
        .status-container {
            margin-top: 15px;
            min-height: 80px;
        }
        .loading-text {
            color: #ffcc00;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        /* Route Station Map Design */
        .route-box {
            background: #0d1624;
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            border: 1px solid #1e2d4a;
        }
        .train-header {
            background: #117a45;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .station-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            position: relative;
            font-size: 13px;
        }
        .station-dot {
            width: 12px;
            height: 12px;
            background: #233554;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            margin-top: 3px;
            z-index: 2;
        }
        .station-info {
            color: #cccccc;
        }
        .station-info strong {
            color: #ffffff;
        }
        .status-badge {
            font-size: 11px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            font-weight: bold;
        }
        .status-passed { background: rgba(0, 255, 204, 0.1); color: #00ffcc; }
        .status-current { background: rgba(255, 51, 51, 0.1); color: #ff3333; }
        .status-upcoming { background: rgba(255, 255, 255, 0.1); color: #aaa; }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="tracker-card">
        <div class="title">TRAIN TRACKER</div>
        
        <div class="time-badge">
            <div class="live-dot"></div>
            <span>SYSTEM TIME: <span id="clockDisplay">--:--:-- AM</span></span>
        </div>

        <div class="search-box">
            <input type="number" id="trainInput" placeholder="Enter Train Number (e.g. 13022)" onkeypress="handleKeyPress(event)">
            <button onclick="trackLiveTrain()">SEARCH</button>
        </div>

        <div class="status-container" id="statusOutput">
            <p style="color: #64748b; font-size: 13px;">Enter a valid train number above to connect with satellite feed.</p>
        </div>
    </div>

    <script>
        // 1. Sabhi Major Train Ka Name Aur Number Database
        const trainDatabase = {
            "13022": {
                name: "Mithila Express",
                route: [
                    { station: "Raxaul Junction (RXL)", time: "Departed • 10:00 AM", status: "passed" },
                    { station: "Sugauli Junction (SGL)", time: "Passed • 10:35 AM", status: "passed" },
                    { station: "Bapudham Motihari (BMKI)", time: "Passed • 11:02 AM", status: "passed" },
                    { station: "Muzaffarpur Jn (MFP)", time: "Arrived • Pf 3 (On Time) • 01:45 PM", status: "current" },
                    { station: "Samastipur Junction (SPJ)", time: "Scheduled • 02:55 PM", status: "upcoming" },
                    { station: "Barauni Junction (BJU)", time: "Scheduled • 04:10 PM", status: "upcoming" },
                    { station: "Jhajha (JAJ)", time: "Scheduled • 07:35 PM", status: "upcoming" }
                ]
            },
            "13019": {
                name: "Bagh Express",
                route: [
                    { station: "Howrah Junction (HWH)", time: "Departed • 09:45 PM", status: "passed" },
                    { station: "Asansol Jn (ASN)", time: "Passed • 01:10 AM", status: "passed" },
                    { station: "Jhajha (JAJ)", time: "Passed • 04:30 AM", status: "passed" },
                    { station: "Barauni Junction (BJU)", time: "Passed • 07:20 AM", status: "passed" },
                    { station: "Muzaffarpur Jn (MFP)", time: "Arrived • Pf 1 • 09:15 AM", status: "current" },
                    { station: "Chhapra Junction (CPR)", time: "Scheduled • 12:30 PM", status: "upcoming" }
                ]
            },
            "15284": {
                name: "Jayanagar - Manihari Janki Express",
                route: [
                    { station: "Jayanagar (JYG)", time: "Departed • 04:45 AM", status: "passed" },
                    { station: "Madhubani (MBI)", time: "Passed • 05:15 AM", status: "passed" },
                    { station: "Darbhanga Jn (DBG)", time: "Arrived • Pf 2 • 06:20 AM", status: "current" },
                    { station: "Samastipur Junction (SPJ)", time: "Scheduled • 07:45 AM", status: "upcoming" }
                ]
            },
            "63012": {
                name: "Muzaffarpur - Samastipur Memu Passenger",
                route: [
                    { station: "Muzaffarpur Jn (MFP)", time: "Departed • 08:30 AM", status: "passed" },
                    { station: "Siho (SIHO)", time: "Passed • 08:52 AM", status: "passed" },
                    { station: "Silout (SLT)", time: "Arrived • On Time • 09:12 AM", status: "current" },
                    { station: "Samastipur Junction (SPJ)", time: "Scheduled • 10:05 AM", status: "upcoming" }
                ]
            }
        };

        // Live Clock Implementation
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            hours = hours < 10 ? '0' + hours : hours;

            document.getElementById('clockDisplay').innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        window.onload = updateClock;

        // Enter key press handler
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                trackLiveTrain();
            }
        }

        // Search Tracker System Logic
        function trackLiveTrain() {
            const num = document.getElementById('trainInput').value.trim();
            const output = document.getElementById('statusOutput');

            if (!num) {
                output.innerHTML = `<p style="color: #ff3333; font-size: 13px;">⚠️ Kripya train number darj karein.</p>`;
                return;
            }

            // Step 1: Fake Satellite Scan Loading Simulation
            output.innerHTML = `
                <div class="loading-text">
                    <span style="display:inline-block; width:15px; height:15px; border:2px solid #ffcc00; border-top:2px solid transparent; border-radius:50%; animation:spin 0.8s linear infinite;"></span>
                    Connecting Live Satellite Route Engine...
                </div>
            `;

            // Dynamic spinner injection
            if (!document.getElementById('spin-style')) {
                const style = document.createElement('style');
                style.id = 'spin-style';
                style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
                document.head.appendChild(style);
            }

            // Step 2: 1.2 Second ke baad response print karega
            setTimeout(() => {
                if (trainDatabase[num]) {
                    const train = trainDatabase[num];
                    let htmlData = `
                        <div class="route-box">
                            <div class="train-header">🟢 LIVE ROUTE MAP: ${train.name} (${num})</div>
                    `;

                    train.route.forEach(st => {
                        let badgeClass = st.status === 'passed' ? 'status-passed' : (st.status === 'current' ? 'status-current' : 'status-upcoming');
                        let badgeText = st.status === 'passed' ? '✓ Passed' : (st.status === 'current' ? '• Live Now' : 'Upcoming');
                        
                        htmlData += `
                            <div class="station-item">
                                <div class="station-dot" style="border-color: ${st.status === 'current' ? '#ff3333' : '#00ffcc'}"></div>
                                <div class="station-info">
                                    <strong>${st.station}</strong> <span class="status-badge ${badgeClass}">${badgeText}</span>
                                    <p style="font-size: 11px; color: #8fa0dd; margin-top:2px;">${st.time}</p>
                                </div>
                            </div>
                        `;
                    });

                    htmlData += `</div>`;
                    output.innerHTML = htmlData;
                } else {
                    // Agar Database me number na ho toh Error Screen
                    output.innerHTML = `
                        <div style="background: rgba(255,51,51,0.1); border: 1px solid #ff3333; padding: 12px; border-radius: 8px; color: #ff9999; font-size: 13px; text-align: left;">
                            📡 <strong>Connection Timeout!</strong><br>
                            Train number ${num} ka live data responsive nahi hai. Kripya list me se try karein (13022, 13019, 15284, 63012).
                        </div>
                    `;
                }
            }, 1200);
        }
    </script>
</body>
</html>
