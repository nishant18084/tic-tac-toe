<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Gaming Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0d0d13;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 30px 0;
            text-align: center;
            width: 100%;
        }

        .banner {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: #ffffff;
            padding: 12px 35px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        .game-card {
            background-color: #1a1a24;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #141419;
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            background-color: #16161f;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: #ff007f;
            box-shadow: 0 12px 25px rgba(255, 0, 127, 0.4);
        }

        .game-card:hover .game-title {
            color: #ff007f;
            background-color: #1c1c27;
        }

        /* --- GAME OVERLAY/MODAL POP-UP --- */
        .game-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .popup-content {
            position: relative;
            width: 90%;
            max-width: 960px;
            height: 70vh;
            background-color: #141419;
            border: 2px solid #ff007f;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
        }

        .popup-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: -45px;
            right: 0;
            background-color: #ff007f;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background-color: #7f00ff;
        }
    </style>
</head>
<body>

    <header>
        <div class="banner">⭐ Nishant Gaming Network ⭐</div>
    </header>

    <main class="games-grid">

        <div class="game-card" onclick="openGame('https://play2048.co/')">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1611195974226-a6a9be9dd763?w=500&auto=format&fit=crop" alt="2048 Game">
            </div>
            <div class="game-title">2048 Game</div>
        </div>

        <div class="game-card" onclick="openGame('https://hextris.io/')">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500&auto=format&fit=crop" alt="Hextris Puzzle">
            </div>
            <div class="game-title">Hextris Puzzle</div>
        </div>

        <div class="game-card" onclick="openGame('https://elgoog.im/breakout/')">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500&auto=format&fit=crop" alt="Retro Breakout">
            </div>
            <div class="game-title">Retro Breakout</div>
        </div>

        <div class="game-card" onclick="openGame('https://flappybird.io/')">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1627856013091-fed6e4e30025?w=500&auto=format&fit=crop" alt="Flappy Bird">
            </div>
            <div class="game-title">Flappy Bird</div>
        </div>

    </main>

    <div id="gamePopup" class="game-popup">
        <div class="popup-content">
            <button class="close-btn" onclick="closeGame()">CLOSE X</button>
            <iframe id="gameFrame" src=""></iframe>
        </div>
    </div>

    <script>
        function openGame(gameUrl) {
            document.getElementById('gameFrame').src = gameUrl;
            document.getElementById('gamePopup').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gamePopup').style.display = 'none';
            document.getElementById('gameFrame').src = ''; // Stop game sound on close
        }
    </script>

</body>
</html>
