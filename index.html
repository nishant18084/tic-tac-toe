<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIHAR TRAIN TRACKER - GEMINI ENGINE</title>
    <script src="config.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b111e; color: #ffffff; font-family: Arial, sans-serif;
            min-height: 100vh; padding: 0 15px 20px 15px; display: flex; flex-direction: column; align-items: center;
        }
        .gemini-verified-bar {
            width: 100%; background: linear-gradient(90deg, #1e3a8a, #0f172a);
            border-bottom: 2px solid #3b82f6; padding: 8px 15px; display: flex;
            justify-content: space-between; align-items: center; font-size: 11px; font-weight: bold; margin-bottom: 20px;
        }
        .gemini-status { color: #38bdf8; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .gemini-sparkle { color: #fff; background: linear-gradient(45deg, #a855f7, #3b82f6); padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        .secure-badge { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 2px 8px; border-radius: 20px; border: 1px solid #10b981; }
        
        .dashboard-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 900px; }
        @media (min-width: 768px) { .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; } }

        .processing-panel { background: #0d1624; border: 1px solid #1e2d4a; border-radius: 12px; padding: 15px; text-align: left; }
        .panel-title { color: #38bdf8; font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .pulse-dot { width: 8px; height: 8px; background: #38bdf8; border-radius: 50%; animation: pulse 1.2s infinite; }
        .log-box { background: #050a12; border: 1px solid #152033; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px; color: #8fa0dd; min-height: 120px; max-height: 180px; overflow-y: auto; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px dashed #152033; padding-bottom: 2px; }
        .log-success { color: #00ffcc; }
        .log-gemini { color: #a855f7; font-weight: bold; }

        .tracker-card { background: #151f32; border: 1px solid #233554; border-radius: 12px; padding: 20px; text-align: center; }
        .title { color: #ff3333; font-size: 22px; font-weight: bold; letter-spacing: 1px; margin-bottom: 4px; }
        .subtitle { color: #8fa0dd; font-size: 11px; margin-bottom: 15px; text-transform: uppercase; }
        .time-badge { background: #0d1624; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 14px; color: #ffcc00; margin-bottom: 15px; border: 1px solid #1e2d4a; font-weight: bold; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: #0d1624; border: 1px solid #233554; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; font-weight: bold; outline: none; }
        button { background: #ff3333; color: white; border: none; padding: 12px 18px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        .status-container { margin-top: 10px; min-height: 50px; }
        .ai-response-box { background: #0d1624; border-radius: 10px; padding: 15px; text-align: left; border: 1px solid #1e2d4a; font-size: 13px; line-height: 1.6; color: #e2e8f0; }
        .ai-header { background: #6b21a8; color: white; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }

        @keyframes pulse { 0%, 100% { transform: scale(0.95); } 50% { transform: scale(1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="gemini-verified-bar">
        <div class="gemini-status"><span class="gemini-sparkle">✦ GEMINI AI</span><span>LIVE LLM GATEWAY</span></div>
        <div class="secure-badge">🔒 SECURE NODE</div>
    </div>

    <div class="dashboard-grid">
        <div class="processing-panel">
            <div class="panel-title"><div class="pulse-dot"></div>AI Diagnostics Terminal</div>
            <div class="log-box" id="terminalLogs">
                <div class="log-entry log-gemini">[SYSTEM] Neural link ready with config.js keys.</div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="title">BIHAR TRAIN TRACKER</div>
            <div class="subtitle">Powered by Gemini Intelligent Core</div>
            <div class="time-badge"><span id="clockDisplay">--:--:-- AM</span></div>

            <div class="search-box">
                <input type="number" id="trainInput" placeholder="Enter Train Number (e.g. 13022)">
                <button onclick="askGeminiAI()">TRACK</button>
            </div>

            <div class="status-container" id="statusOutput">
                <p style="color: #64748b; font-size: 13px;">AI Engine will generate analytics based on your input.</p>
            </div>
        </div>
    </div>

    <script>
        function addLog(text, type = '') {
            const box = document.getElementById('terminalLogs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clockDisplay').innerText = now.toLocaleTimeString();
        }, 1000);

        async function askGeminiAI() {
            const trainNum = document.getElementById('trainInput').value.trim();
            const output = document.getElementById('statusOutput');

            if (!trainNum) {
                output.innerHTML = `<p style="color: #ff3333;">⚠️ Train number daalein.</p>`;
                return;
            }

            addLog(`[GEMINI] Initiating active API handshake for #${trainNum}...`, "log-gemini");
            output.innerHTML = `<div style="color: #38bdf8; font-weight: bold;"><span style="display:inline-block; width:12px; height:12px; border:2px solid #3b82f6; border-top:transparent; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px;"></span>AI is thinking...</div>`;

            const promptText = `Provide the typical official route, current scheduled timings, and key stations within Bihar for Indian Train Number ${trainNum}. Format it clearly as a clean list of stations with standard arrival timings. Keep it brief and professional.`;

            try {
                const response = await fetch(`${GEMINI_CONFIG.MODEL_URL}?key=${GEMINI_CONFIG.API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                addLog(`[SUCCESS] Data stream resolved from Gemini Core.`, "log-success");
                
                // Convert simple newlines to HTML breaks for readable format
                const formattedText = aiText.replace(/\n/g, "<br>");

                output.innerHTML = `
                    <div class="ai-response-box">
                        <div class="ai-header">✦ GEMINI LIVE INTELLIGENCE FEED</div>
                        <div>${formattedText}</div>
                    </div>
                `;
            } catch (error) {
                addLog(`[ERROR] Direct link rejected. Check Key authentication.`, "log-warn");
                output.innerHTML = `<p style="color: #ffcc00;">⚠️ Handshake error. GitHub Page par load hone ke baad config key verify karein.</p>`;
            }
        }
    </script>
</body>
</html>
