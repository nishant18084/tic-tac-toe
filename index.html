<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My 3D Shooter Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* Mobile Touch Controls */
        .control-panel {
            position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none;
        }
        .btn {
            width: 80px; height: 80px; border-radius: 50%; color: white; font-weight: bold; font-size: 16px;
            display: flex; align-items: center; justify-content: center; pointer-events: auto; background: rgba(255,255,255,0.3);
        }
        #moveBtn { background: rgba(0, 255, 0, 0.4); }
        #shootBtn { background: rgba(255, 0, 0, 0.6); }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="btn" id="moveBtn">RUN</div>
        <div class="btn" id="shootBtn">FIRE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Scene aur Camera Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Light
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // 2. 3D Map (Green Ground)
        const groundGeo = new THREE.PlaneGeometry(50, 100);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x1b5e20 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 3. 3D Player Character
        const playerGeo = new THREE.CapsuleGeometry(0.4, 1, 4, 8);
        const playerMat = new THREE.MeshBasicMaterial({ color: 0x2196f3 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 0.9;
        scene.add(player);

        // Camera Angle (Third-Person View)
        camera.position.set(0, 4, 5);

        // Game Variables
        let isMoving = false;
        let bullets = [];

        // Mobile Touch Logic
        document.getElementById('moveBtn').addEventListener('touchstart', () => isMoving = true);
        document.getElementById('moveBtn').addEventListener('touchend', () => isMoving = false);

        document.getElementById('shootBtn').addEventListener('touchstart', () => {
            // Fire 3D Bullet
            const bulletGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffeb3b });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            bullet.position.set(player.position.x, player.position.y + 0.3, player.position.z - 0.5);
            scene.add(bullet);
            bullets.push(bullet);
        });

        // 4. Main Game Loop
        function animate() {
            requestAnimationFrame(animate);

            // Player movement
            if (isMoving) {
                player.position.z -= 0.15;
            }

            // Bullet movement
            bullets.forEach((b, i) => {
                b.position.z -= 0.4;
                if (b.position.z < player.position.z - 30) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            });

            // Camera following player
            camera.position.z = player.position.z + 5;
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            renderer.render(scene, camera);
        }

        animate();

        // Resize screen handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
