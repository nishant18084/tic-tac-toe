<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - 6 Games Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(-45deg, #111, #222, #0b132b, #1c2541);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Stats Bar */
        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffea00;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 10;
        }

        /* Main Menu / Games Dashboard */
        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        .menu-title {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            color: #1e90ff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .game-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: 0.3s ease;
        }

        .game-item.unlocked {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.1);
        }

        .game-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .action-btn {
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .btn-play { background: #2ed573; color: white; }
        .btn-play:hover { transform: scale(1.05); }
        .btn-lock { background: #ffea00; color: #111; }

        /* Tic Tac Toe Game Screen */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        select, .btn-back, .btn-reset {
            padding: 10px 15px; font-size: 1rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
        }
        select { background: white; color: #333; }
        .btn-reset { background: #ff4757; color: white; }
        .btn-back { background: #57606f; color: white; }

        .board {
            display: grid; grid-template-columns: repeat(3, 95px);
            grid-template-rows: repeat(3, 95px); gap: 8px;
            background: rgba(255, 255, 255, 0.05); padding: 12px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .cell {
            width: 95px; height: 95px; background: rgba(255, 255, 255, 0.9);
            border-radius: 10px; font-size: 2.6rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #333; transition: 0.2s;
        }
        .cell:hover { background: white; transform: scale(1.03); }
        .cell[data-user="X"] { color: #2ed573; }
        .cell[data-user="O"] { color: #1e90ff; }
        .cell.winner { background: #ffea00 !important; box-shadow: 0 0 20px #ffea00; }

        #status, #countdown { margin-top: 15px; font-size: 1.3rem; font-weight: bold; text-align: center; }
        #countdown { color: #ffea00; min-height: 24px; }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="stats-bar">🪙 Coins: <span id="coinCount">0</span></div>

    <div class="menu-container" id="menuScreen">
        <div class="menu-title">🎮 SELECT A GAME</div>
        <div class="games-list">
            <div class="game-card game-item" id="card-1">
                <span class="game-name">1. Snake</span>
                <button class="action-btn btn-lock" id="btn-1" onclick="buyGame(1, 100)">🪙 100</button>
            </div>
            <div class="game-card game-item" id="card-2">
                <span class="game-name">2. Car Race</span>
                <button class="action-btn btn-lock" id="btn-2" onclick="buyGame(2, 200)">🪙 200</button>
            </div>
            <div class="game-card game-item" id="card-3">
                <span class="game-name">3. Block Blast</span>
                <button class="action-btn btn-lock" id="btn-3" onclick="buyGame(3, 300)">🪙 300</button>
            </div>
            <div class="game-card game-item" id="card-4">
                <span class="game-name">4. Free Fire</span>
                <button class="action-btn btn-lock" id="btn-4" onclick="buyGame(4, 400)">🪙 400</button>
            </div>
            <div class="game-card game-item" id="card-5">
                <span class="game-name">5. Bike Race</span>
                <button class="action-btn btn-lock" id="btn-5" onclick="buyGame(5, 500)">🪙 500</button>
            </div>
            <div class="game-item unlocked">
                <span class="game-name">6. Tic Tac Toe</span>
                <button class="action-btn btn-play" onclick="showTTTScreen()">PLAY</button>
            </div>
        </div>
    </div>

    <div class="game-screen" id="tttScreen">
        <div class="controls">
            <button class="btn-back" onclick="showMenuScreen()">⬅ Menu</button>
            <select id="gameMode" onchange="handleModeChange()">
                <option value="computer">Vs Computer</option>
                <option value="friend">Vs Friend</option>
            </select>
            <select id="levelSelect" onchange="resetGame()">
                <option value="1">Level 1 🟢</option>
                <option value="2">Level 2 🟡</option>
                <option value="3">Level 3 🔴</option>
            </select>
            <button class="btn-reset" onclick="resetGame()">Reset</button>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div id="status">Turn: X</div>
        <div id="countdown"></div>
    </div>

    <script>
        let coins = 0;
        let unlockedGames = [false, false, false, false, false, false];

        const menuScreen = document.getElementById('menuScreen');
        const tttScreen = document.getElementById('tttScreen');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const countdownText = document.getElementById('countdown');
        const gameModeSelect = document.getElementById('gameMode');
        const levelSelect = document.getElementById('levelSelect');
        const coinCountDisplay = document.getElementById('coinCount');
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let isGameActive = true;
        let nextLevelTimeout;
        let countdownInterval;
        let fireworks = [];
        let particles = [];

        const winningConditions = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function showTTTScreen() {
            menuScreen.style.display = 'none';
            tttScreen.style.display = 'flex';
            resetGame();
        }

        function showMenuScreen() {
            clearTimeout(nextLevelTimeout);
            clearInterval(countdownInterval);
            tttScreen.style.display = 'none';
            menuScreen.style.display = 'flex';
        }

        function handleModeChange() {
            levelSelect.style.display = (gameModeSelect.value === 'friend') ? 'none' : 'inline-block';
            resetGame();
        }

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));
            if (gameState[clickedCellIndex] !== "" || !isGameActive || (gameModeSelect.value === 'computer' && currentPlayer === 'O')) return;

            makeMove(clickedCellIndex, currentPlayer);
            if (isGameActive && gameModeSelect.value === 'computer' && currentPlayer === 'O') {
                setTimeout(computerMove, 500);
            }
        }

        function makeMove(index, player) {
            gameState[index] = player;
            cells[index].innerText = player;
            cells[index].setAttribute('data-user', player);
            if (checkResult()) return;
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = `Turn: ${currentPlayer}`;
        }

        function computerMove() {
            if (!isGameActive) return;
            const level = levelSelect.value;
            let move;
            if (level === '3') move = getBestMove('O') || getBestMove('X') || getRandomMove();
            else if (level === '2') move = Math.random() > 0.5 ? (getBestMove('O') || getBestMove('X') || getRandomMove()) : getRandomMove();
            else move = getRandomMove();

            if (move !== undefined) makeMove(move, 'O');
        }

        function getBestMove(player) {
            for (let condition of winningConditions) {
                let count = 0; let emptyIndex = -1;
                for (let index of condition) {
                    if (gameState[index] === player) count++;
                    else if (gameState[index] === "") emptyIndex = index;
                }
                if (count === 2 && emptyIndex !== -1) return emptyIndex;
            }
            return null;
        }

        function getRandomMove() {
            let emptyCells = [];
            gameState.forEach((val, idx) => { if (val === "") emptyCells.push(idx); });
            return emptyCells.length > 0 ? emptyCells[Math.floor(Math.random() * emptyCells.length)] : undefined;
        }

        function checkResult() {
            let roundWon = false; let winningLine = [];
            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                if (gameState[winCondition[0]] !== '' && gameState[winCondition[0]] === gameState[winCondition[1]] && gameState[winCondition[1]] === gameState[winCondition[2]]) {
                    roundWon = true; winningLine = winCondition; break;
                }
            }

            if (roundWon) {
                isGameActive = false;
                winningLine.forEach(index => cells[index].classList.add('winner'));
                
                if (currentPlayer === 'X') {
                    // Player Wins
                    statusText.innerText = "You Win! 🎉 (+100 Coins)";
                    coins += 100;
                    startFireworksEffect();
                    if (gameModeSelect.value === 'computer' && levelSelect.value !== '3') startNextLevelTimer();
                } else {
                    // Computer Wins
                    statusText.innerText = "Computer Wins! 🤖 (-100 Coins)";
                    coins = Math.max(0, coins - 100); // 100 coins minus, par 0 se neeche nahi jayega
                }
                
                coinCountDisplay.innerText = coins;
                return true;
            }
            if (!gameState.includes("")) { statusText.innerText = "Game Draw! 🤝"; isGameActive = false; return true; }
            return false;
        }

        function startNextLevelTimer() {
            let timeLeft = 4; const nextLvl = parseInt(levelSelect.value) + 1;
            countdownText.innerText = `Level ${nextLvl} in ${timeLeft}s...`;
            countdownInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft > 0) countdownText.innerText = `Level ${nextLvl} in ${timeLeft}s...`;
                else clearInterval(countdownInterval);
            }, 1000);
            nextLevelTimeout = setTimeout(() => {
                levelSelect.value = nextLvl.toString(); resetGame();
            }, 4000);
        }

        function resetGame() {
            clearTimeout(nextLevelTimeout); clearInterval(countdownInterval);
            currentPlayer = 'X'; gameState = ["", "", "", "", "", "", "", "", ""]; isGameActive = true;
            statusText.innerText = `Turn: ${currentPlayer}`; countdownText.innerText = "";
            fireworks = []; particles = [];
            cells.forEach(cell => { cell.innerText = ""; cell.removeAttribute('data-user'); cell.classList.remove('winner'); });
        }

        // Shop Purchase Logic
        function buyGame(id, cost) {
            if (unlockedGames[id]) return;
            if (coins >= cost) {
                coins -= cost;
                coinCountDisplay.innerText = coins;
                unlockedGames[id] = true;
                
                const card = document.getElementById(`card-${id}`);
                const btn = document.getElementById(`btn-${id}`);
                card.classList.add('unlocked');
                btn.innerText = "PLAY";
                btn.className = "action-btn btn-play";
                btn.onclick = function() { alert("Yeh game abhi ready nahi hai, jaldi update aayega!"); };
                alert("Game unlocked! 🎉");
            } else {
                alert("Coins kam hain! Tic Tac Toe jeetkar aur coins kamayein. 🪙");
            }
        }

        // Fireworks Animation
        function startFireworksEffect() {
            let count = 0;
            const interval = setInterval(() => {
                if (isGameActive || count > 8) { clearInterval(interval); return; }
                fireworks.push({ x: Math.random() * canvas.width, y: canvas.height, tx: Math.random() * canvas.width, ty: Math.random() * (canvas.height / 2), v: 5, color: `hsl(${Math.random() * 360}, 100%, 60%)` });
                count++;
            }, 300);
            animate();
        }
        function createParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 4 + 2;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, alpha: 1, color: color });
            }
        }
        function animate() {
            if (isGameActive && fireworks.length === 0 && particles.length === 0) return;
            requestAnimationFrame(animate); ctx.clearRect(0, 0, canvas.width, canvas.height);
            fireworks.forEach((f, i) => {
                f.y -= f.v; ctx.beginPath(); ctx.fillStyle = f.color; ctx.arc(f.x, f.y, 4, 0, Math.PI * 2); ctx.fill();
                if (f.y <= f.ty) { createParticles(f.x, f.y, f.color); fireworks.splice(i, 1); }
            });
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if (p.alpha <= 0) { particles.splice(i, 1); } 
                else { ctx.save(); ctx.globalAlpha = p.alpha; ctx.beginPath(); ctx.fillStyle = p.color; ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
            });
        }
    </script>
</body>
</html>
