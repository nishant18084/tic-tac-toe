<div class="container">
    <h2>Live Train Tracker</h2>
    
    <div class="live-clock-card">
        <span class="clock-label">🔴 DEVICE TIME:</span>
        <span id="liveClock">00:00:00 AM</span>
    </div>

    <div class="search-box">
        <input type="number" id="trainNum" placeholder="Enter 5-Digit Train Number">
        <button onclick="getTrainStatus()">Check Status</button>
    </div>
    <div id="result"></div>
</div>
