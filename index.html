<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Nishant Arcade Hub ⚡</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* Login Box */
        #loginContainer {
            background: #1f2833;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #66fcf1;
            box-shadow: 0px 0px 20px rgba(102, 252, 241, 0.4);
            text-align: center;
            width: 90%;
            max-width: 350px;
            margin-top: 15vh;
        }
        #loginContainer h2 {
            color: #66fcf1;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #66fcf1;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #45f3ff;
            background: #0b0c10;
            color: #fff;
            outline: none;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #66fcf1;
            color: #0b0c10;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 10px #66fcf1;
            transition: 0.3s;
        }
        .login-btn:hover {
            background: #45f3ff;
            box-shadow: 0 0 20px #45f3ff;
        }

        /* Main Game Hub Section */
        #mainArcade {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            padding: 20px 0;
            text-align: center;
            border-bottom: 3px solid #66fcf1;
            box-shadow: 0px 4px 20px rgba(102, 252, 241, 0.3);
        }
        header h1 {
            color: #66fcf1;
            margin: 0;
            text-shadow: 0 0 10px #66fcf1;
        }
        .welcome-text {
            color: #45f3ff;
            margin-top: 8px;
            font-weight: bold;
        }
        #searchBar {
            padding: 12px 20px;
            width: 80%;
            max-width: 400px;
            border-radius: 25px;
            border: 2px solid #45f3ff;
            background-color: #1f2833;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-top: 15px;
        }
        
        /* Game Arena Container */
        #arenaContainer {
            display: none;
            width: 95%;
            max-width: 960px;
            margin: 20px 0;
            background: #1f2833;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #66fcf1;
            position: relative;
        }
        
        /* 🔥 AAPKA APNA LOGO (Game ke upar dikhega) 🔥 */
        .my-custom-logo {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            box-shadow: 0 0 10px #ff007f;
        }

        #gameScreen {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 8px;
            background-color: #000;
        }
        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            float: right;
            font-weight: bold;
        }

        /* Grid Layout */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding: 30px 0;
        }
        .game-card {
            background-color: #1f2833;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #45f3ff;
            text-align: center;
            transition: 0.3s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(69, 243, 255, 0.5);
        }
        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .game-title {
            padding: 10px;
            font-size: 14px;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div id="loginContainer">
        <h2>🎮 Gamer Login 🎮</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username daalein">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password daalein">
        </div>
        <button class="login-btn" onclick="handleLogin()">Let's Play</button>
    </div>

    <div id="mainArcade">
        <header>
            <h1>⚡ NISHANT'S ARCADE HUB ⚡</h1>
            <div class="welcome-text" id="welcomeUser"></div>
            <input type="text" id="searchBar" placeholder="🔍 Game search karein..." oninput="filterGames()">
        </header>

        <div id="arenaContainer">
            <div class="my-custom-logo">⭐ NISHANT GAMING CO. ⭐</div>
            <button class="close-btn" onclick="closeGame()">❌ Close Game</button>
            <iframe id="gameScreen" src="" allowfullscreen></iframe>
        </div>

        <div class="game-grid" id="gameGrid"></div>
    </div>

    <script>
        // Subway Surfers aur baaki saare premium trending games ki custom list
        const myCleanGames = [
            { title: "Subway Surfers", url: "https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/gertdaj/se9@266de077b960b7193f2f81ef69c366ff1cc9e403/subway-surfers/subway-surfers.xml", thumbnailUrl: "https://images.unsplash.com/photo-1612287230202-1bf1d85d1bdf?w=200" },
            { title: "Temple Run 2", url: "https://www.crazygames.com/embed/temple-run-2", thumbnailUrl: "https://images.unsplash.com/photo-1611078489935-0cb964de46d6?w=200" },
            { title: "Moto X3M Bike Racing", url: "https://www.crazygames.com/embed/moto-x3m", thumbnailUrl: "https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=200" },
            { title: "Minecraft Classic", url: "https://classic.minecraft.net/", thumbnailUrl: "https://images.unsplash.com/photo-1605901309584-818e25960a8f?w=200" },
            { title: "Tunnel Rush", url: "https://www.crazygames.com/embed/tunnel-rush", thumbnailUrl: "https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=200" },
            { title: "Cyber Cars Racing", url: "https://www.crazygames.com/embed/cyber-cars-punk-racing", thumbnailUrl: "https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?w=200" },
            { title: "Stickman Fighting", url: "https://www.crazygames.com/embed/stickman-street-fighting", thumbnailUrl: "https://images.unsplash.com/photo-1551103782-8ab07afd45c1?w=200" },
            { title: "Google Snake", url: "https://www.google.com/fbx?fbx=snake_arcade", thumbnailUrl: "https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=200" },
            { title: "Tetris Arcade", url: "https://tetris.com/play-tetris", thumbnailUrl: "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=200" },
            { title: "2048 Game", url: "https://2048game.com/", thumbnailUrl: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=200" },
            { title: "Slither.io", url: "https://slither.io/", thumbnailUrl: "https://images.unsplash.com/photo-1527474305487-b87b222841cc?w=200" },
            { title: "Paper.io 2", url: "https://paper-io.com/", thumbnailUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200" }
        ];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user.trim() !== "" && pass.trim() !== "") {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainArcade').style.display = 'flex';
                document.getElementById('welcomeUser').innerText = `Welcome, Player: ${user} 🎮`;
                displayGames(myCleanGames);
            } else {
                alert("Kripya Username aur Password daalein!");
            }
        }

        function displayGames(gamesList) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = ""; 
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => playGame(game.url);
                card.innerHTML = `
                    <img src="${game.thumbnailUrl}" alt="${game.title}">
                    <div class="game-title">${game.title}</div>
                `;
                grid.appendChild(card);
            });
        }

        function playGame(url) {
            const container = document.getElementById('arenaContainer');
            const iframe = document.getElementById('gameScreen');
            iframe.src = url;
            container.style.display = 'block';
            window.scrollTo({ top: container.offsetTop - 20, behavior: 'smooth' });
        }

        function closeGame() {
            const container = document.getElementById('arenaContainer');
            const iframe = document.getElementById('gameScreen');
            iframe.src = "";
            container.style.display = 'none';
        }

        function filterGames() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = myCleanGames.filter(game => game.title.toLowerCase().includes(query));
            displayGames(filtered);
        }
    </script>
</body>
</html>
