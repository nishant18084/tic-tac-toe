<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Player & Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            min-height: 100vh;
        }

        /* टॉप नेविगेशन बार (जैसा आपके स्क्रीनशॉट में था) */
        .navbar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #1f2833;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .logo {
            color: #ff4757;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #2f3542;
            color: #fff;
            outline: none;
            width: 220px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border: 1px solid #ff4757;
        }

        button {
            padding: 10px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #e84118;
        }

        /* मुख्य प्लेयर एरिया */
        .main-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .note {
            color: #ffb142;
            font-size: 13px;
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
        }

        /* वीडियो स्क्रीन विंडो */
        .video-container {
            width: 100%;
            aspect-ratio: 16/9; /* परफेक्ट वीडियो साइज (मोबाइल और डेस्कटॉप दोनों के लिए) */
            background: #000000;
            border: 2px solid #1f2833;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* वीडियो बिना कटे सही से दिखेगा */
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">Race Player & Downloader</div>
        <div class="search-box">
            <input type="text" id="videoUrl" placeholder="यहाँ वीडियो का लिंक पेस्ट करें..." />
            <button onclick="playVideo()">Play</button>
        </div>
    </div>

    <div class="main-content">
        <p class="note">💡 नोट: केवल डायरेक्ट वीडियो लिंक्स (जैसे .mp4, .m3u8, .webm) ही यहाँ प्ले किए जा सकते हैं।</p>
        
        <div class="video-container">
            <video id="myVideo" controls autoplay>
                आपका ब्राउज़र इस वीडियो टैग को सपोर्ट नहीं करता।
            </video>
        </div>
    </div>

<script>
    function playVideo() {
        const url = document.getElementById('videoUrl').value.trim();
        const video = document.getElementById('myVideo');

        if (!url) {
            alert('कृपया पहले एक वीडियो लिंक डालें!');
            return;
        }

        // HLS Streaming (.m3u8) के लिए स्पेशल सपोर्ट
        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Apple Safari के लिए नेटिव सपोर्ट
                video.src = url;
                video.play();
            } else {
                alert('आपका ब्राउज़र इस स्ट्रीमिंग फॉर्मेट को सपोर्ट नहीं करता।');
            }
        } else {
            // सामान्य वीडियो फॉर्मेट्स (MP4, WebM आदि) के लिए
            video.src = url;
            video.load();
            video.play().catch(error => {
                alert('वीडियो प्ले नहीं हो सका। कृपया लिंक की जांच करें कि वह डायरेक्ट वीडियो लिंक है या नहीं।');
            });
        }
    }
</script>

</body>
</html>
