<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Video Player Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f1a;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* टॉप नेविगेशन बार */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            padding: 10px 0;
            border-bottom: 1px solid #2e2e4f;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .home-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: #cc0044;
        }

        h1 {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            font-size: 1.5rem;
        }

        /* लिंक इनपुट बॉक्स का स्टाइल (YouTube जैसा सर्च बार लुक) */
        .link-box {
            display: flex;
            align-items: center;
            width: 50%;
            max-width: 600px;
        }

        .link-box input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #2e2e4f;
            background: #1a1a2e;
            color: white;
            border-radius: 20px 0 0 20px;
            outline: none;
        }

        .link-box input:focus {
            border-color: #ff0055;
        }

        .link-box button {
            padding: 12px 25px;
            border: none;
            background: #ff0055;
            color: white;
            font-weight: bold;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .link-box button:hover {
            background: #cc0044;
        }

        /* निर्देश संदेश */
        .info-text {
            margin-bottom: 20px;
            color: #8a8ab3;
            font-size: 0.9rem;
            text-align: center;
        }

        /* वीडियो प्लेयर विंडो */
        #player-container {
            display: none;
            width: 100%;
            max-width: 800px;
            height: 450px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            margin-top: 10px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-section">
            <button class="home-btn" onclick="goHome()">Home</button>
            <h1>Race Link Player</h1>
        </div>
        
        <div class="link-box">
            <input type="text" id="videoLinkInput" placeholder="यहाँ वीडियो का Embed लिंक पेस्ट करें...">
            <button onclick="loadUserVideo()">Play</button>
        </div>
    </div>

    <p class="info-text">💡 नोट: YouTube वीडियो चलाने के लिए उसका Share > Embed लिंक (या <code>https://www.youtube.com/embed/VIDEO_ID</code>) यहाँ पेस्ट करें।</p>

    <div id="player-container">
        <iframe id="video-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        // इनपुट बॉक्स से लिंक लेकर वीडियो प्ले करने का फंक्शन
        function loadUserVideo() {
            const inputLink = document.getElementById('videoLinkInput').value.trim();
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('video-player');

            if (inputLink === "") {
                alert("कृपया पहले एक वीडियो लिंक पेस्ट करें!");
                return;
            }

            // अगर यूजर नॉर्मल YouTube लिंक डालता है (watch?v=), तो उसे अपने आप एम्बेड (embed) में बदल देगा
            let finalLink = inputLink;
            if (inputLink.includes("youtube.com/watch?v=")) {
                let videoId = inputLink.split("v=")[1].split("&")[0];
                finalLink = "https://www.youtube.com/embed/" + videoId;
            } else if (inputLink.includes("youtu.be/")) {
                let videoId = inputLink.split("youtu.be/")[1].split("?")[0];
                finalLink = "https://www.youtube.com/embed/" + videoId;
            }

            // प्लेयर में लिंक सेट करना और उसे दिखाना
            iframe.src = finalLink;
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // होम बटन फंक्शन (सब कुछ रीसेट करने के लिए)
        function goHome() {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('video-player');
            const inputField = document.getElementById('videoLinkInput');
            
            iframe.src = "";
            container.style.display = 'none';
            inputField.value = "";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>hai
