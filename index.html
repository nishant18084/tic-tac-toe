<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DYNAMIC TRAIN TRACKER</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b111e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsive Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 320px 1fr;
            }
        }

        /* LEFT COLUMN: AI Terminal Panel */
        .processing-panel {
            background: #0d1624;
            border: 1px solid #1e2d4a;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }
        .panel-title {
            color: #00ffcc;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        .log-box {
            background: #050a12;
            border: 1px solid #152033;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #8fa0dd;
            min-height: 200px;
            max-height: 280px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px dashed #152033;
            padding-bottom: 4px;
        }
        .log-success { color: #00ffcc; }
        .log-warn { color: #ffcc00; }

        /* RIGHT COLUMN: Main Train Tracker */
        .tracker-card {
            background: #151f32;
            border: 1px solid #233554;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .title {
            color: #ff3333;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #8fa0dd;
            font-size: 11px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Live Clock */
        .time-badge {
            background: #0d1624;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 15px;
            color: #ffcc00;
            margin-bottom: 20px;
            border: 1px solid #1e2d4a;
            font-weight: bold;
        }

        /* Search Input */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: #0d1624;
            border: 1px solid #233554;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            outline: none;
        }
        input:focus { border-color: #ff3333; }
        button {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #cc0000; }

        /* Route Stations Display */
        .status-container { margin-top: 15px; min-height: 60px; }
        .route-box {
            background: #0d1624;
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            border: 1px solid #1e2d4a;
        }
        .train-header {
            background: #117a45;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .station-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .station-dot {
            width: 10px;
            height: 10px;
            background: #233554;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            margin-top: 4px;
        }
        .station-info { color: #cccccc; }
        .station-info strong { color: #ffffff; }
        .status-badge {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            font-weight: bold;
        }
        .status-passed { background: rgba(0, 255, 204, 0.1); color: #00ffcc; }
        .status-current { background: rgba(255, 51, 51, 0.1); color: #ff3333; }
        .status-upcoming { background: rgba(255, 255, 255, 0.1); color: #aaa; }

        .official-btn {
            display: inline-block;
            margin-top: 10px;
            background: #0284c7;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 204, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        
        <div class="processing-panel">
            <div class="panel-title">
                <div class="pulse-dot"></div>
                AI Diagnostics Terminal
            </div>
            <div class="log-box" id="terminalLogs">
                <div class="log-entry log-success">[CORE] Time Sync Tracking Engine Online.</div>
                <div class="log-entry">[SYSTEM] Waiting for target telemetry...</div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="title">TRAIN TRACKER</div>
            <div class="subtitle">AI Dynamic Clock Comparison Unit</div>
            
            <div class="time-badge">
                <span>SYSTEM TIME: <span id="clockDisplay">--:--:-- AM</span></span>
            </div>

            <div class="search-box">
                <input type="number" id="trainInput" placeholder="Enter Train Number (e.g. 13022)" onkeypress="handleKeyPress(event)">
                <button onclick="trackLiveTrain()">TRACK</button>
            </div>

            <div class="status-container" id="statusOutput">
                <p style="color: #64748b; font-size: 13px;">Schedules compute dynamically based on your system clock.</p>
                <p style="color: #475569; font-size: 11px; margin-top: 6px;">Try: 13022, 12391, 12561</p>
            </div>
        </div>

    </div>

    <script>
        // Data format set directly to 24-Hour integers [hours, minutes] for perfect comparison logic
        const trainDatabase = {
            "13022": {
                name: "Mithila Express",
                route: [
                    { station: "Raxaul Junction (RXL)", hour: 10, min: 0, timeStr: "10:00 AM" },
                    { station: "Sugauli Junction (SGL)", hour: 11, min: 30, timeStr: "11:30 AM" },
                    { station: "Bapudham Motihari (BMKI)", hour: 13, min: 15, timeStr: "01:15 PM" },
                    { station: "Muzaffarpur Jn (MFP)", hour: 16, min: 45, timeStr: "04:45 PM" },
                    { station: "Samastipur Junction (SPJ)", hour: 18, min: 30, timeStr: "06:30 PM" },
                    { station: "Barauni Junction (BJU)", hour: 20, min: 0, timeStr: "08:00 PM" }
                ]
            },
            "12391": {
                name: "Shramjeevi Superfast Express",
                route: [
                    { station: "Rajgir (RGD)", hour: 8, min: 5, timeStr: "08:05 AM" },
                    { station: "Patna Junction (PNBE)", hour: 10, min: 30, timeStr: "10:30 AM" },
                    { station: "Arrah Junction (ARA)", hour: 11, min: 45, timeStr: "11:45 AM" },
                    { station: "Dildarnagar Jn (DLN)", hour: 13, min: 20, timeStr: "01:20 PM" },
                    { station: "Pt. DD Upadhyaya Jn (DDU)", hour: 15, min: 10, timeStr: "03:10 PM" },
                    { station: "New Delhi (NDLS)", hour: 23, min: 55, timeStr: "11:55 PM" }
                ]
            },
            "12561": {
                name: "Swatantrata Senani Express",
                route: [
                    { station: "Jaynagar (JYG)", hour: 14, min: 0, timeStr: "02:00 PM" },
                    { station: "Darbhanga Jn (DBG)", hour: 15, min: 30, timeStr: "03:30 PM" },
                    { station: "Samastipur Junction (SPJ)", hour: 17, min: 15, timeStr: "05:15 PM" },
                    { station: "Muzaffarpur Jn (MFP)", hour: 19, min: 0, timeStr: "07:00 PM" },
                    { station: "Chhapra Junction (CPR)", hour: 21, min: 45, timeStr: "09:45 PM" }
                ]
            }
        };

        function addLog(text, type = '') {
            const box = document.getElementById('terminalLogs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight; 
        }

        // Clock display system update loop
        function updateClock() {
            const now = new Date();
            let hours = now.getHours(), minutes = now.getMinutes(), seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clockDisplay').innerText = `${hours < 10 ? '0'+hours : hours}:${minutes < 10 ? '0'+minutes : minutes}:${seconds < 10 ? '0'+seconds : seconds} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        window.onload = updateClock;

        function handleKeyPress(event) {
            if (event.key === "Enter") trackLiveTrain();
        }

        function trackLiveTrain() {
            const num = document.getElementById('trainInput').value.trim();
            const output = document.getElementById('statusOutput');

            if (!num) {
                addLog("Execution Rejected: Empty Key.", "log-warn");
                output.innerHTML = `<p style="color: #ff3333; font-size: 13px;">⚠️ Train number darj karein.</p>`;
                return;
            }

            addLog(`Analyzing time parameters for target #${num}...`);
            
            output.innerHTML = `
                <div style="color: #ffcc00; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span style="display:inline-block; width:14px; height:14px; border:2px solid #ffcc00; border-top:2px solid transparent; border-radius:50%; animation:spin 0.8s linear infinite;"></span>
                    Syncing Schedule Vector Matrix...
                </div>
            `;

            setTimeout(() => {
                if (trainDatabase[num]) {
                    const train = trainDatabase[num];
                    addLog(`Telemetry Match! Processing timeline for ${train.name}`, "log-success");

                    // Actual real-world current system time variables
                    const now = new Date();
                    const currentHour = now.getHours();
                    const currentMin = now.getMinutes();
                    const currentTotalMins = (currentHour * 60) + currentMin;

                    let htmlData = `<div class="route-box"><div class="train-header">🛰️ TIME TRACKED: ${train.name} (${num})</div>`;
                    
                    let liveFound = false;

                    train.route.forEach((st, index) => {
                        const stationTotalMins = (st.hour * 60) + st.min;
                        
                        let status = "";
                        let badgeText = "";
                        let dotColor = "#00ffcc";

                        // Algorithm to dynamically check status by comparing minutes
                        // If current time is within a 15-minute window of schedule, mark it LIVE
                        if (Math.abs(currentTotalMins - stationTotalMins) <= 15 && !liveFound) {
                            status = "status-current";
                            badgeText = "LIVE NOW";
                            dotColor = "#ff3333";
                            liveFound = true; 
                        } else if (currentTotalMins > stationTotalMins) {
                            status = "status-passed";
                            badgeText = "PASSED ✓";
                            dotColor = "#00ffcc";
                        } else {
                            status = "status-upcoming";
                            badgeText = "UPCOMING";
                            dotColor = "#4b5563";
                        }

                        // Special fallback: If train has passed previous stations but hasn't reached next, 
                        // make sure the very first future station looks active or clean
                        htmlData += `
                            <div class="station-item">
                                <div class="station-dot" style="border-color: ${dotColor}"></div>
                                <div class="station-info">
                                    <strong>${st.station}</strong> <span class="status-badge ${status}">${badgeText}</span>
                                    <p style="font-size: 11px; color: #8fa0dd; margin-top:1px;">Scheduled: ${st.timeStr}</p>
                                </div>
                            </div>
                        `;
                    });

                    output.innerHTML = htmlData + `</div>`;
                    addLog(`Render completed successfully for #${num}.`, "log-success");
                } else {
                    addLog(`Error: Code #${num} missing in local registers.`, "log-warn");
                    output.innerHTML = `
                        <div style="background: rgba(255,255,255,0.05); border: 1px solid #233554; padding: 12px; border-radius: 8px; color: #cccccc; font-size: 13px; text-align: left;">
                            📡 <strong>Unknown Node Detected</strong><br>
                            Is train ka data direct official timetable core engine se trace karein:<br>
                            <a href="https://enquiry.indianrail.gov.in/mntes/" target="_blank" class="official-btn" style="text-decoration:none;font-weight:bold;">🔍 Open NTES Time Dashboard</a>
                        </div>
                    `;
                }
            }, 800);
        }
    </script>
</body>
</html>
