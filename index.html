<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f1a;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 30px;
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .video-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .video-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2e2e4f;
            width: 250px;
            text-align: center;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
            border-color: #ff0055;
        }

        .video-card h3 {
            font-size: 1.2rem;
            color: #ffffff;
        }

        #player-container {
            display: none;
            width: 100%;
            max-width: 800px;
            height: 450px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Race Video Player Hub</h1>

    <div class="video-container">
        <div class="video-card" onclick="playVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
            <h3>Video Tutorial 1</h3>
        </div>
        <div class="video-card" onclick="playVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')">
            <h3>Music Video</h3>
        </div>
        <div class="video-card" onclick="playVideo('https://www.youtube.com/embed/kJQP7kiw5Fk')">
            <h3>Gaming Stream</h3>
        </div>
    </div>

    <div id="player-container">
        <iframe id="video-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        function playVideo(videoUrl) {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('video-player');
            
            // iframe में नया वीडियो लिंक डालना
            iframe.src = videoUrl;
            
            // प्लेयर को शो करना
            container.style.display = 'block';
            
            // स्क्रीन को स्मूदली स्क्रॉल करके प्लेयर तक ले जाना
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
