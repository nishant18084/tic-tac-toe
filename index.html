<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Nishant Gaming Portal ⚡</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            padding: 20px 0;
            text-align: center;
            border-bottom: 3px solid #ff007f;
            box-shadow: 0px 4px 20px rgba(255, 0, 127, 0.3);
        }
        header h1 {
            color: #fff;
            margin: 0;
            text-shadow: 0 0 10px #ff007f;
            font-size: 2.2rem;
        }
        .my-brand-logo {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            margin: 15px 0;
            box-shadow: 0 0 15px #ff007f;
            letter-spacing: 1px;
        }
        .arcade-frame-container {
            width: 95%;
            max-width: 1200px;
            height: 80vh;
            background-color: #121212;
            border: 3px solid #7f00ff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(127, 0, 255, 0.4);
            margin-bottom: 20px;
        }
        /* Itch.io open catalog layout - no external brand logos */
        #itchArcadeStore {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ NISHANT'S ARCADE PORTAL ⚡</h1>
    </header>

    <div class="my-brand-logo">⭐ NISHANT GAMING NETWORK ⭐</div>

    <div class="arcade-frame-container">
        <iframe id="itchArcadeStore" src="https://itch.io/games/platform-web/free/embed" allowfullscreen></iframe>
    </div>

</body>
</html>
