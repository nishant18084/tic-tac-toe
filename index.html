<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Gaming Network</title>
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0d13;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- HEADER & BANNER --- */
        header {
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        .banner {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            padding: 12px 35px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); }
            50% { box-shadow: 0 0 35px rgba(127, 0, 255, 0.9); }
            100% { box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); }
        }

        /* --- RESPONSIVE GAME GRID --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        /* --- GAME CARD STYLES --- */
        .game-card {
            background-color: #1a1a24;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* Image Wrapper to maintain 16:9 ratio */
        .image-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #23232f, #141419);
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Game Title Styling */
        .game-title {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            background-color: #16161f;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        /* --- HOVER EFFECTS (The 10/10 Touch) --- */
        .game-card:hover {
            transform: translateY(-8px);
            border-color: #ff007f;
            box-shadow: 0 12px 25px rgba(255, 0, 127, 0.4);
        }

        .game-card:hover .game-title {
            color: #ff007f;
            background-color: #1c1c27;
        }
    </style>
</head>
<body>

    <header>
        <div class="banner">⭐ Nishant Gaming Network ⭐</div>
    </header>

    <main class="games-grid">

        <a href="#" class="game-card">
            <div class="image-container">
                <img src="subway-surfers.jpg" alt="Subway Surfers" onerror="this.style.display='none';">
            </div>
            <div class="game-title">Subway Surfers</div>
        </a>

        <a href="#" class="game-card">
            <div class="image-container">
                <img src="retro-breakout.jpg" alt="Retro Breakout" onerror="this.style.display='none';">
            </div>
            <div class="game-title">Retro Breakout</div>
        </a>

        <a href="#" class="game-card">
            <div class="image-container">
                <img src="2048.jpg" alt="2048 Game" onerror="this.style.display='none';">
            </div>
            <div class="game-title">2048 Game</div>
        </a>

        <a href="#" class="game-card">
            <div class="image-container">
                <img src="minecraft.jpg" alt="Minecraft Classic" onerror="this.style.display='none';">
            </div>
            <div class="game-title">Minecraft Classic</div>
        </a>

        <a href="#" class="game-card">
            <div class="image-container">
                <img src="hextris.jpg" alt="Hextris Puzzle" onerror="this.style.display='none';">
            </div>
            <div class="game-title">Hextris Puzzle</div>
        </a>

        <a href="#" class="game-card">
            <div class="image-container">
                <img src="google-snake.jpg" alt="Google Snake" onerror="this.style.display='none';">
            </div>
            <div class="game-title">Google Snake</div>
        </a>

    </main>

</body>
</html>
