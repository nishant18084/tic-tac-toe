<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Neon Mega Arcade Hub ⚡</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        header {
            width: 100%;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            padding: 15px 0;
            text-align: center;
            border-bottom: 3px solid #66fcf1;
            box-shadow: 0px 4px 20px rgba(102, 252, 241, 0.3);
        }
        h1 {
            color: #66fcf1;
            margin: 0;
            font-size: 2rem;
            text-shadow: 0 0 10px #66fcf1;
            letter-spacing: 2px;
        }
        .arcade-container {
            width: 100%;
            height: calc(100vh - 70px);
            background-color: #121212;
        }
        #megaArcadeStore {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 NEON MEGA ARCADE (1000+ GAMES) 🎮</h1>
    </header>
    <div class="arcade-container">
        <iframe id="megaArcadeStore" src="https://www.gamepix.com/embed" allowfullscreen></iframe>
    </div>
</body>
</html>
