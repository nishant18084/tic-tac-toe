<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Nishant Gaming Network ⚡</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 🔥 HEADER & AAPKA CUSTOM LOGO 🔥 */
        header {
            width: 100%;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            padding: 10px 0;
            text-align: center;
            border-bottom: 3px solid #ff007f;
            box-shadow: 0px 4px 20px rgba(255, 0, 127, 0.3);
            z-index: 999;
        }
        header h1 {
            color: #fff;
            margin: 0;
            font-size: 1.6rem;
            text-shadow: 0 0 10px #ff007f;
        }
        .my-custom-logo {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
            box-shadow: 0 0 15px #ff007f;
            letter-spacing: 1px;
        }

        /* 🟢 GAME SCREEN CONTAINER (GamePix ka logo chupane ke liye) 🟢 */
        .arcade-wrapper {
            width: 100%;
            height: calc(100vh - 85px);
            position: relative;
            overflow: hidden;
            background-color: #0b0c10;
        }

        /* GamePix portal load hoga jo 100% chalega aur uski height badha di hai taaki unka logo screen se bahar dhakel jaye */
        #gameScreen {
            width: 100%;
            height: calc(100% + 60px); 
            border: none;
            position: absolute;
            top: -50px; /* GamePix ke top header/logo ko upar chupa diya */
            left: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ NISHANT'S ARCADE PORTAL ⚡</h1>
        <div class="my-custom-logo">⭐ NISHANT GAMING NETWORK ⭐</div>
    </header>

    <div class="arcade-wrapper">
        <iframe id="gameScreen" src="https://www.gamepix.com/embed" allowfullscreen></iframe>
    </div>

</body>
</html>
