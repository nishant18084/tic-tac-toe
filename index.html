<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Arcade Pro - Mobile & PC Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #020510; color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; width: 100vw; overflow: hidden; 
            user-select: none; -webkit-user-select: none;
        }
        
        /* Universal Responsive Console Wrapper */
        .arcade-wrapper {
            width: 95vw; max-width: 960px; 
            height: 90vh; max-height: 540px;
            background: linear-gradient(180deg, #090f26 0%, #050917 100%);
            border: 4px solid #1c2e6e; border-radius: 24px; padding: 15px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,255,204,0.1);
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden;
        }

        /* SCREEN VISIBILITY */
        .screen { display: none; flex-direction: column; width: 100%; height: 100%; justify-content: center; align-items: center; }
        .screen.active-screen { display: flex !important; }

        .main-title {
            font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 10px;
            background: linear-gradient(90deg, #00ffcc, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0,255,204,0.4); letter-spacing: 2px; width: 100%;
        }

        /* START SCREEN */
        #startView { gap: 25px; }
        .big-start-btn {
            background: linear-gradient(90deg, #00ffcc, #00aaff); color: #020510;
            padding: 16px 50px; font-size: 1.5rem; font-weight: 900; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px rgba(0,255,204,0.4);
        }

        /* GAME SELECTION MENU (Responsive Grid) */
        #menuView { justify-content: flex-start; align-items: center; }
        .menu-layout {
            display: grid; grid-template-columns: 1fr; gap: 10px; 
            width: 100%; max-height: 70%; overflow-y: auto; padding: 5px;
        }
        @media(min-width: 600px) { .menu-layout { grid-template-columns: 1fr 1fr; } }
        
        .alltime-badge {
            background: rgba(255, 0, 128, 0.15); border: 1px solid #ff0077;
            padding: 4px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 800;
            color: #ff3399; margin-bottom: 10px; text-align: center;
        }
        .game-card {
            background: linear-gradient(135deg, #121b44 0%, #080d24 100%);
            border: 2px solid #20337a; border-radius: 16px; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-info { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; }
        .card-title { font-size: 1rem; font-weight: 800; color: #ffffff; }
        .card-subtitle { font-size: 0.7rem; color: #8196e6; }
        .play-btn {
            background: linear-gradient(90deg, #ff0055, #ff00aa); color: white;
            padding: 6px 14px; font-size: 0.8rem; font-weight: 900; border: none; border-radius: 10px; cursor: pointer;
        }

        /* DIFFICULTY SELECTION */
        #difficultyView { gap: 15px; }
        .diff-container { display: flex; flex-direction: column; gap: 10px; width: 80%; justify-content: center; }
        @media(min-width: 500px) { .diff-container { flex-direction: row; } }
        .diff-btn {
            flex: 1; padding: 12px; font-size: 1rem; font-weight: 900;
            border: none; border-radius: 14px; color: white; cursor: pointer;
        }
        .easy-btn { background: linear-gradient(90deg, #00ff88, #00aa55); }
        .normal-btn { background: linear-gradient(90deg, #ffaa00, #d47a00); }
        .hard-btn { background: linear-gradient(90deg, #ff0055, #cc0044); }

        /* FLEXIBLE GAMEPLAY LAYOUT */
        #gameView { flex-direction: column; gap: 10px; align-items: center; justify-content: space-between; }
        @media(min-width: 700px) { #gameView { flex-direction: row; } }

        .game-left-panel { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        @media(min-width: 700px) { .game-left-panel { flex-direction: column; height: 100%; width: auto; align-items: flex-start; } }

        .hud-bar { display: flex; gap: 10px; align-items: center; }
        @media(min-width: 700px) { .hud-bar { flex-direction: column; align-items: flex-start; gap: 15px; } }

        .back-btn { padding: 6px 12px; font-size: 0.8rem; font-weight: 800; border-radius: 10px; border: 1px solid #ff0055; background: rgba(255,0,85,0.15); color: #ff4588; cursor: pointer; }
        .game-tag-title { font-size: 1.2rem; font-weight: 800; color: #00ffcc; }
        .live-score { font-size: 1.1rem; font-weight: bold; color: #ffff00; }

        .game-main-area { display: flex; justify-content: center; align-items: center; max-height: 55%; }
        
        canvas#arcadeCanvas {
            background: #01030a; border: 3px solid #00ffcc; border-radius: 16px;
            max-height: 260px; aspect-ratio: 1/1; display: block;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.2);
        }

        /* Responsive Controls */
        .console-controls { display: none; flex-direction: row; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        @media(min-width: 700px) { .console-controls { flex-direction: column; width: auto; } }

        .dpad-row { display: flex; gap: 5px; }
        .ctrl-btn {
            width: 44px; height: 44px; background: linear-gradient(135deg, #162452 0%, #0d1633 100%); 
            color: #00ffcc; border: 2px solid #253b80; font-size: 1.1rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .ctrl-btn:active { background: #00ffcc; color: #01030a; }
        .shoot-action-btn {
            padding: 10px 20px; background: linear-gradient(90deg, #ff2a00, #ff0066);
            color: white; border: none; font-weight: 900; border-radius: 20px; font-size: 0.9rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="arcade-wrapper">
        <div class="screen active-screen" id="startView">
            <div class="main-title">MEGA ARCADE PRO</div>
            <button class="big-start-btn" onclick="showScreen('menuView')">START</button>
        </div>

        <div class="screen" id="menuView">
            <div class="main-title">SELECT GAME</div>
            <div class="alltime-badge" id="bestAllTime">🔥 ALL-TIME HIGH: 0</div>
            
            <div class="menu-layout">
                <div class="game-card"><div class="card-info"><span class="card-title">Tic Tac Toe Retro</span><span class="card-subtitle">X vs O Match</span></div><button class="play-btn" onclick="selectGame(0)">PLAY</button></div>
                <div class="game-card"><div class="card-info"><span class="card-title">Neon Snake 3D</span><span class="card-subtitle">Nibble Grid</span></div><button class="play-btn" onclick="selectGame(1)">PLAY</button></div>
                <div class="game-card"><div class="card-info"><span class="card-title">Asphalt Nitro Pro</span><span class="card-subtitle">Cyber Racer</span></div><button class="play-btn" onclick="selectGame(2)">PLAY</button></div>
                <div class="game-card"><div class="card-info"><span class="card-title">Diamond Block Blast</span><span class="card-subtitle">Grid Puzzle</span></div><button class="play-btn" onclick="selectGame(3)">PLAY</button></div>
                <div class="game-card"><div class="card-info"><span class="card-title">Squad Survival 2D</span><span class="card-subtitle">Laser Shooter</span></div><button class="play-btn" onclick="selectGame(4)">PLAY</button></div>
                <div class="game-card"><div class="card-info"><span class="card-title">Moto Hill Overdrive</span><span class="card-subtitle">Hill Climber</span></div><button class="play-btn" onclick="selectGame(5)">PLAY</button></div>
            </div>
        </div>

        <div class="screen" id="difficultyView">
            <div class="main-title" style="font-size:1.8rem;">DIFFICULTY</div>
            <div class="diff-container">
                <button class="diff-btn easy-btn" onclick="launchGame('easy')">EASY</button>
                <button class="diff-btn normal-btn" onclick="launchGame('normal')">NORMAL</button>
                <button class="diff-btn hard-btn" onclick="launchGame('hard')">HARD</button>
            </div>
        </div>

        <div class="screen" id="gameView">
            <div class="game-left-panel">
                <div class="hud-bar">
                    <button class="back-btn" onclick="showScreen('menuView')">⬅ Menu</button>
                    <span class="game-tag-title" id="hudTitle">Game</span>
                </div>
                <div class="live-score">Score: <span id="hudScore" style="color:#fff;">0</span></div>
            </div>

            <div class="game-main-area">
                <canvas id="arcadeCanvas" width="400" height="400"></canvas>
            </div>

            <div class="console-controls" id="padConsole">
                <button class="ctrl-btn" onmousedown="startMove('LEFT')" ontouchstart="startMove('LEFT')">◀</button>
                <button class="ctrl-btn" onmousedown="startMove('UP')" ontouchstart="startMove('UP')">▲</button>
                <button class="ctrl-btn" onmousedown="startMove('DOWN')" ontouchstart="startMove('DOWN')">▼</button>
                <button class="ctrl-btn" onmousedown="startMove('RIGHT')" ontouchstart="startMove('RIGHT')">▶</button>
                <button class="shoot-action-btn" id="consoleActionBtn" style="display:none;" onmousedown="handleAction()" ontouchstart="handleAction()">💥 SHOOT</button>
            </div>
        </div>
    </div>

    <script>
        let selectedGameId = null, currentGame = null, loopRef = null;
        let pX, pY, score, objects, bullets, particles;
        let snake, food, sDx, sDy, snakeTimer, snakeSpeedDelay;
        let hillBikeY, hillBikeVy, obstacleSpawnRate, enemySpeed;
        let activeDir = null, moveInterval = null;
        let tttGrid = ["","","","","","","","",""], tttTurn = "X", tttGameOver = false;

        const canvas = document.getElementById('arcadeCanvas');
        const ctx = canvas.getContext('2d');

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            if(screenId === 'menuView') {
                if(loopRef) cancelAnimationFrame(loopRef);
                currentGame = null;
                refreshGlobalBest();
            }
        }

        function selectGame(id) {
            selectedGameId = id;
            if(id === 0) { launchGame('normal'); } 
            else { showScreen('difficultyView'); }
        }

        function refreshGlobalBest() {
            let maxScore = 0;
            for(let i=0; i<=5; i++) {
                let val = localStorage.getItem('arc_w_best_' + i) || 0;
                if(parseInt(val) > maxScore) maxScore = val;
            }
            document.getElementById('bestAllTime').innerText = `🔥 ALL-TIME HIGH: ${maxScore}`;
        }

        function syncScore() {
            document.getElementById('hudScore').innerText = score;
            let currentBest = localStorage.getItem('arc_w_best_' + currentGame) || 0;
            if (score > parseInt(currentBest)) {
                localStorage.setItem('arc_w_best_' + currentGame, score);
            }
        }

        function launchGame(diffLevel) {
            showScreen('gameView');
            currentGame = selectedGameId;
            score = 0; objects = []; bullets = []; particles = [];
            syncScore();

            if(diffLevel === 'easy') { snakeSpeedDelay = 150; obstacleSpawnRate = 0.02; enemySpeed = 3; }
            else if(diffLevel === 'normal') { snakeSpeedDelay = 100; obstacleSpawnRate = 0.04; enemySpeed = 4.5; }
            else if(diffLevel === 'hard') { snakeSpeedDelay = 65; obstacleSpawnRate = 0.07; enemySpeed = 6.5; }

            document.getElementById('padConsole').style.display = (currentGame === 0) ? 'none' : 'flex';
            document.getElementById('consoleActionBtn').style.display = (currentGame === 4) ? 'block' : 'none';
            
            if(currentGame === 0) {
                document.getElementById('hudTitle').innerText = "Tic Tac Toe";
                tttGrid = ["","","","","","","","",""]; tttTurn = "X"; tttGameOver = false;
            } else {
                if(currentGame === 1) {
                    document.getElementById('hudTitle').innerText = "Neon Snake";
                    snake = [{x:200, y:200}, {x:180, y:200}, {x:160, y:200}]; food = {x:100, y:100}; sDx = 20; sDy = 0;
                } else if(currentGame === 2) {
                    document.getElementById('hudTitle').innerText = "Asphalt Nitro";
                    pX = 200; pY = 340;
                } else if(currentGame === 3) {
                    document.getElementById('hudTitle').innerText = "Block Blast";
                    pX = 200; pY = 360;
                } else if(currentGame === 4) {
                    document.getElementById('hudTitle').innerText = "Squad Survival";
                    pX = 200; pY = 320;
                } else if(currentGame === 5) {
                    document.getElementById('hudTitle').innerText = "Hill Overdrive";
                    pX = 80; hillBikeY = 280; hillBikeVy = 0;
                }
            }

            snakeTimer = performance.now();
            if(loopRef) cancelAnimationFrame(loopRef);
            loopRef = requestAnimationFrame(engineLoop);
        }

        canvas.addEventListener('click', function(e) {
            if(currentGame !== 0 || tttGameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = 400 / rect.width;
            const scaleY = 400 / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            let col = Math.floor(x / 133);
            let row = Math.floor(y / 133);
            let index = row * 3 + col;

            if(index >= 0 && index < 9 && tttGrid[index] === "" && tttTurn === "X") {
                tttGrid[index] = "X";
                checkTTTState();
                if(!tttGameOver) {
                    tttTurn = "O";
                    setTimeout(botTicTacToeMove, 250);
                }
            }
        });

        function botTicTacToeMove() {
            let emptyIndices = tttGrid.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
            if(emptyIndices.length > 0) {
                let randomChoice = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                tttGrid[randomChoice] = "O";
                checkTTTState();
                if(!tttGameOver) tttTurn = "X";
            }
        }

        document.addEventListener('mouseup', () => clearInterval(moveInterval));
        document.addEventListener('touchend', () => clearInterval(moveInterval));

        function startMove(dir) {
            activeDir = dir; executeMove();
            if(moveInterval) clearInterval(moveInterval);
            moveInterval = setInterval(executeMove, 50);
        }

        function executeMove() {
            if(!currentGame || !activeDir) return;
            if(currentGame === 1) {
                if(activeDir==='LEFT' && sDx===0) { sDx = -20; sDy = 0; }
                if(activeDir==='RIGHT' && sDx===0) { sDx = 20; sDy = 0; }
                if(activeDir==='UP' && sDy===0) { sDx = 0; sDy = -20; }
                if(activeDir==='DOWN' && sDy===0) { sDx = 0; sDy = 20; }
                activeDir = null;
            } else if(currentGame === 5) {
                if((activeDir==='UP' || activeDir==='RIGHT') && hillBikeY === 280) { hillBikeVy = -12; }
                activeDir = null;
            } else {
                if(activeDir==='LEFT') pX = Math.max(30, pX - 15);
                if(activeDir==='RIGHT') pX = Math.min(370, pX + 15);
                if(activeDir==='UP' && currentGame === 4) pY = Math.max(160, pY - 15);
                if(activeDir==='DOWN' && currentGame === 4) pY = Math.min(360, pY + 15);
            }
        }

        function handleAction() { if(currentGame === 4) bullets.push({x: pX, y: pY - 20}); }
        function triggerBlast(x, y, color) {
            for(let i=0; i<8; i++) particles.push({x:x, y:y, dx:(Math.random()-0.5)*5, dy:(Math.random()-0.5)*5, r:Math.random()*2+1, a:1, c:color});
        }
        function triggerGameOver(msg = "Game Over!") { alert(`🎮 ${msg}\nScore: ${score}`); showScreen('menuView'); }

        function engineLoop(timestamp) {
            if(currentGame === null) return;
            ctx.fillStyle = '#030612'; ctx.fillRect(0,0,400,400);

            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.a -= 0.05;
                ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
                if(p.a <= 0) particles.splice(i, 1);
            });

            if(currentGame === 0) {
                ctx.strokeStyle = '#253b80'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(133, 20); ctx.lineTo(133, 380); ctx.moveTo(266, 20); ctx.lineTo(266, 380);
                ctx.moveTo(20, 133); ctx.lineTo(380, 133); ctx.moveTo(20, 266); ctx.lineTo(380, 266); ctx.stroke();
                
                tttGrid.forEach((val, idx) => {
                    let r = Math.floor(idx / 3), c = idx % 3;
                    let x = c * 133 + 66, y = r * 133 + 66;
                    if(val === "X") {
                        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 10;
                        ctx.beginPath(); ctx.moveTo(x-30, y-30); ctx.lineTo(x+30, y+30); ctx.moveTo(x+30, y-30); ctx.lineTo(x-30, y+30); ctx.stroke();
                    } else if(val === "O") {
                        ctx.strokeStyle = '#ff00aa'; ctx.lineWidth = 10;
                        ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.stroke();
                    }
                });
            }

            else if(currentGame === 1) {
                if(timestamp - snakeTimer > snakeSpeedDelay) {
                    let h = {x: snake[0].x + sDx, y: snake[0].y + sDy};
                    if(h.x < 10 || h.x >= 390 || h.y < 10 || h.y >= 390 || snake.some(s=>s.x===h.x && s.y===h.y)) { triggerGameOver(); return; }
                    snake.unshift(h);
                    if(Math.abs(h.x - food.x) < 15 && Math.abs(h.y - food.y) < 15) {
                        score += 10; syncScore(); triggerBlast(food.x, food.y, '#ff00aa');
                        food = {x: Math.floor(Math.random()*18)*20+20, y: Math.floor(Math.random()*18)*20+20};
                    } else { snake.pop(); }
                    snakeTimer = timestamp;
                }
                ctx.fillStyle = '#ff0077'; ctx.beginPath(); ctx.arc(food.x, food.y, 7, 0, Math.PI*2); ctx.fill();
                snake.forEach((s, idx) => { ctx.fillStyle = idx===0?'#00ffcc':'#00aa99'; ctx.fillRect(s.x-8, s.y-8, 16, 16); });
            }
            
            else if(currentGame === 2) {
                if(Math.random() < obstacleSpawnRate) objects.push({x:Math.random()*200+100, y:-40, spd:enemySpeed});
                ctx.fillSty
