<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ultimate Gaming Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #00ff88; }
        #searchBar {
            padding: 10px;
            width: 60%;
            max-width: 400px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .game-card {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
            min-width: 120px;
        }
        .game-card:hover {
            background-color: #00ff88;
            color: #000;
            transform: scale(1.05);
        }
        #gameScreen {
            width: 100%;
            max-width: 800px;
            height: 600px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            display: none;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <h1>🎮 My Gaming Hub 🎮</h1>
    <input type="text" id="searchBar" placeholder="Search games..." onkeyup="searchGames()">

    <div class="game-container" id="gameList">
        <div class="game-card" onclick="playGame('https://play.pacman.com/')">Pac-Man</div>
        <div class="game-card" onclick="playGame('https://browsercraft.org/')">Minecraft (Clone)</div>
        <div class="game-card" onclick="playGame('https://tetris.com/play-tetris')">Tetris</div>
        <div class="game-card" onclick="playGame('https://2048game.com/')">2048</div>
    </div>

    <iframe id="gameScreen" src="" frameborder="0" allowfullscreen></iframe>

    <script>
        // Game chalane ke liye function
        function playGame(url) {
            const iframe = document.getElementById('gameScreen');
            iframe.src = url;
            iframe.style.display = 'block';
            window.scrollTo({ top: iframe.offsetTop, behavior: 'smooth' });
        }

        // Search karne ke liye function
        function searchGames() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].innerText.toLowerCase().includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
