<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Rocket & Trophy Edition</title>
    <style>
        /* Moving Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(-45deg, #1f1c2c, #928dab, #2c3e50, #000000);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-bottom: 5px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            font-size: 2.5rem;
            z-index: 5;
        }

        /* Controls Section */
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 5;
        }

        select, button {
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        select { background-color: white; color: #333; }
        button { background-color: #ff4757; color: white; }
        button:hover { transform: translateY(-2px); background-color: #ff6b81; }

        /* Game Board */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 5;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            font-size: 2.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
        }

        .cell:hover { background-color: white; transform: scale(1.03); }
        .cell[data-user="X"] { color: #2ed573; }
        .cell[data-user="O"] { color: #1e90ff; }

        /* Cells Winning Shine */
        .cell.winner {
            animation: winFlash 0.5s ease infinite alternate;
            background-color: #ffa500 !important;
            color: white !important;
            box-shadow: 0 0 20px #ffa500;
        }

        @keyframes winFlash {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.05); filter: brightness(1.3); }
        }

        #status, #countdown {
            margin-top: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 5;
        }
        #countdown { color: #ffea00; min-height: 24px; }

        /* Rocket Fireworks Canvas */
        #fwCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Trophy Pop-up Overlay */
        .trophy-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .trophy-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .trophy-content {
            text-align: center;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .trophy-overlay.show .trophy-content {
            transform: scale(1);
        }

        .trophy-icon {
            font-size: 7rem;
            animation: trophyBounce 1s ease infinite alternate;
            filter: drop-shadow(0 0 20px #ffd700);
        }

        @keyframes trophyBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .trophy-text {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 15px;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="fwCanvas"></canvas>

    <div class="trophy-overlay" id="trophyOverlay">
        <div class="trophy-content">
            <div class="trophy-icon">🏆</div>
            <div class="trophy-text" id="trophyText">VICTORY!</div>
        </div>
    </div>

    <h1>Tic Tac Toe</h1>

    <div class="controls">
        <select id="gameMode" onchange="handleModeChange()">
            <option value="computer">Vs Computer</option>
            <option value="friend">Vs Friend</option>
        </select>
        
        <select id="levelSelect" onchange="resetGame()">
            <option value="1">Level 1 🟢</option>
            <option value="2">Level 2 🟡</option>
            <option value="3">Level 3 🔴</option>
        </select>

        <button onclick="resetGame()">Reset</button>
    </div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div id="status">Turn: X</div>
    <div id="countdown"></div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const countdownText = document.getElementById('countdown');
        const gameModeSelect = document.getElementById('gameMode');
        const levelSelect = document.getElementById('levelSelect');
        const trophyOverlay = document.getElementById('trophyOverlay');
        const trophyText = document.getElementById('trophyText');
        
        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let isGameActive = true;
        let nextLevelTimeout;
        let countdownInterval;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // --- ROCKETS (FIREWORKS) ENGINE ---
        const canvas = document.getElementById('fwCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworksActive = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // gravity
                this.alpha -= this.decay;
            }
        }

        function spawnRocket() {
            if(!fireworksActive) return;
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.5) + canvas.height * 0.1;
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa500', '#ffea00', '#ff00ff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for(let i=0; i<40; i++) {
                particles.push(new Particle(x, y, color));
            }
            setTimeout(spawnRocket, Math.random() * 400 + 200);
        }

        function animateFireworks() {
            if(!fireworksActive && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            requestAnimationFrame(animateFireworks);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if(p.alpha <= 0) particles.splice(idx, 1);
            });
        }

        function startFireworks() {
            fireworksActive = true;
            spawnRocket();
            animateFireworks();
        }

        function stopFireworks() {
            fireworksActive = false;
        }

        // --- GAME LOGIC ---
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleModeChange() {
            levelSelect.style.display = (gameModeSelect.value === 'friend') ? 'none' : 'inline-block';
            resetGame();
        }

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !isGameActive || (gameModeSelect.value === 'computer' && currentPlayer === 'O')) {
                return;
            }

            makeMove(clickedCellIndex, currentPlayer);

            if (isGameActive && gameModeSelect.value === 'computer' && currentPlayer === 'O') {
                setTimeout(computerMove, 500);
            }
        }

        function makeMove(index, player) {
            gameState[index] = player;
            cells[index].innerText = player;
            cells[index].setAttribute('data-user', player);

            if (checkResult()) return;

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = `Turn: ${currentPlayer}`;
        }

        function computerMove() {
            if (!isGameActive) return;
            const level = levelSelect.value;
            let move;

            if (level === '3') {
                move = getBestMove('O') || getBestMove('X') || getRandomMove();
            } else if (level === '2') {
                move = Math.random() > 0.5 ? (getBestMove('O') || getBestMove('X') || getRandomMove()) : getRandomMove();
            } else {
                move = getRandomMove();
            }

            if (move !== undefined) makeMove(move, 'O');
        }

        function getBestMove(player) {
            for (let condition of winningConditions) {
                let count = 0;
                let emptyIndex = -1;
                for (let index of condition) {
                    if (gameState[index] === player) count++;
                    else if (gameState[index] === "") emptyIndex = index;
                }
                if (count === 2 && emptyIndex !== -1) return emptyIndex;
            }
            return null;
        }

        function getRandomMove() {
            let emptyCells = [];
            gameState.forEach((val, idx) => { if (val === "") emptyCells.push(idx); });
            return emptyCells.length > 0 ? emptyCells[Math.floor(Math.random() * emptyCells.length)] : undefined;
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                if (gameState[winCondition[0]] !== '' && gameState[winCondition[0]] === gameState[winCondition[1]] && gameState[winCondition[1]] === gameState[winCondition[2]]) {
                    roundWon = true;
                    winningLine = winCondition;
                    break;
                }
            }

            if (roundWon) {
                statusText.innerText = `Player ${currentPlayer} Wins!`;
                isGameActive = false;
                winningLine.forEach(index => cells[index].classList.add('winner'));

                // Rocket burst and Trophy show conditions
                if (gameModeSelect.value === 'friend' || (gameModeSelect.value === 'computer' && currentPlayer === 'X')) {
                    startFireworks();
                    showTrophyScreen();
                    
                    if (gameModeSelect.value === 'computer') {
                        if (levelSelect.value !== '3') {
                            startNextLevelTimer();
                        } else {
                            trophyText.innerText = "🏆 GAME COMPLETED! 🏆";
                        }
                    } else {
                        trophyText.innerText = `Player ${currentPlayer} Wins! 🏆`;
                    }
                }
                return true;
            }

            if (!gameState.includes("")) {
                statusText.innerText = "Game Draw! 🤝";
                isGameActive = false;
                return true;
            }
            return false;
        }

        function showTrophyScreen() {
            trophyOverlay.classList.add('show');
            // 2.5 seconds baad automatic trophy screen hat jayegi taaki game dikhe
            setTimeout(() => {
                trophyOverlay.classList.remove('show');
            }, 2500);
        }

        function startNextLevelTimer() {
            let timeLeft = 4;
            const nextLvl = parseInt(levelSelect.value) + 1;
            countdownText.innerText = `Level ${nextLvl} starts in ${timeLeft}s...`;
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft > 0) {
                    countdownText.innerText = `Level ${nextLvl} starts in ${timeLeft}s...`;
                } else {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            nextLevelTimeout = setTimeout(() => {
                goToNextLevel();
            }, 4000);
        }

        function goToNextLevel() {
            let currentLevel = parseInt(levelSelect.value);
            if (currentLevel < 3) {
                levelSelect.value = (currentLevel + 1).toString();
            }
            resetGame();
        }

        function resetGame() {
            clearTimeout(nextLevelTimeout);
            clearInterval(countdownInterval);
            stopFireworks();
            trophyOverlay.classList.remove('show');
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            statusText.innerText = `Turn: ${currentPlayer}`;
            countdownText.innerText = "";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.removeAttribute('data-user');
                cell.classList.remove('winner');
            });
        }
    </script>
</body>
</html>
